<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition
	template="#{abstractIdentityBean.abstractIdentityEntity.template}/pageTemplate.xhtml"
	xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
	xmlns:h="jakarta.faces.html"
	
	xmlns:ui="jakarta.faces.facelets" xmlns:a="jakarta.faces.passthrough"
	xmlns:c="jakarta.tags.core" xmlns:fn="jakarta.tags.functions"
	xmlns:o="http://omnifaces.org/ui"
	xmlns:of="http://omnifaces.org/functions"
	xmlns:p="http://primefaces.org/ui"
	xmlns:k="http://kickoff.example.org/ui">

	<ui:define name="content">
		<section class="slice py-8">
		<div class="container py-5">
			<div class="row clearfix">
				<div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
					<div class="body">
						<p:growl showDetail="true" escape="false" id="messages"
							life="3000" />


						<h:form id="meuform">


							<p:commandButton value="Limpar Filtro"
								onclick="PF('modWidget').clearFilters()" />

							<p:dataTable var="_item" value="#{moduloBean.model}"
								paginator="true" rows="100"
								paginatorTemplate="{RowsPerPageDropdown} {FirstPageLink} {PreviousPageLink} {CurrentPageReport} {NextPageLink} {LastPageLink}"
								rowsPerPageTemplate="10, 50, 100" lazy="true"
								widgetVar="modWidget" reflow="true" paginatorPosition="bottom"
								id="_itemTable">

								<p:column headerText="Ativo" sortBy="#{_item.enabled}">
									<p:graphicImage rendered="#{_item.enabled}" class="img-circle"
										value="/resources/true.png" />
									<p:graphicImage rendered="#{!_item.enabled}" class="img-circle"
										value="/resources/false.png" />
								</p:column>

								<p:column headerText="Nome" filterBy="#{_item.name}"
									sortBy="#{_item.name}">
									<h:outputText value="#{_item.name}" />
								</p:column>

								<p:column headerText="Aplicativo"
									filterBy="#{_item.abstractIdentityEntity.name}"
									sortBy="#{_item.abstractIdentityEntity.name}">
									<h:outputText value="#{_item.abstractIdentityEntity.name}" />
								</p:column>

								<p:column headerText="Posição" filterBy="#{_item.include}"
									sortBy="#{_item.include}">
									<h:outputText value="#{_item.include}" />
								</p:column>
								
								

								<p:column headerText="Widgets">
									<h:outputText
										value="#{_item.components.stream().filter(b->b.id > 0)
              .map(b->b.abstractWidget.id)
              .toList()}" />
								</p:column>

								<p:column>
									<f:facet name="header">
										<h:outputText value="Ação" />
									</f:facet>
									<p:button icon="fa fa-th-list" title="Exibir"
										outcome="module_view">
										<f:param name="id" value="#{_item.uuid}" />
									</p:button>
										#{''} 
										<p:button icon="fa fa-edit" title="Editar"
										outcome="module_edit">
										<f:param name="id" value="#{_item.uuid}" />
									</p:button>
								</p:column>


							</p:dataTable>
						</h:form>





					</div>
				</div>
			</div>
		</div>
		</section>
	</ui:define>
</ui:composition>
