<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition
	template="#{abstractIdentityBean.abstractIdentityEntity.template}/pageTemplate.xhtml"
	xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
	xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
	xmlns:a="jakarta.faces.passthrough" xmlns:c="jakarta.tags.core"
	xmlns:fn="jakarta.tags.functions" xmlns:o="http://omnifaces.org/ui"
	xmlns:of="http://omnifaces.org/functions"
	xmlns:p="http://primefaces.org/ui"
	xmlns:k="http://kickoff.example.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">

	<ui:define name="content">
		<section class="slice py-8">
		<div class="container py-5">
			<div class="row clearfix">
				<div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
					<div class="body">
						<p:tabView id="tablayer" multiViewState="true">
							<div class="container py-5">
								<div class="row clearfix">
									<div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
										<div class="body">
											<p:tab title="Itens do Menu">
												<h:form id="form">
													<p:growl id="msgs" showDetail="true" />

													<h4>
														<h:outputLabel value=" #{urlMenuBean.urlMenu.name}" />
													</h4>
													
													<div align="right">
														<p:button title="Novo Menu Item" id="newmenulink"
															outcome="/administrator/menu_item_edit" icon="fa fa-plus">
															<f:param name="menu_id" value="#{urlMenuBean.id}" />
														</p:button>
													</div>
													<p:treeTable reflow="true"
														emptyMessage="Nenhum item encontrado!" id="apps2"
														value="#{urlMenuBean.root}" var="_menuItem"
														selectionMode="single" rowKey="#{_menuItem.id}"
														selection="#{urlMenuBean.selectedNode}">

														<f:facet rendered="false" name="header">
															<p:commandButton process="apps2" rendered="false"
																update="tablayer:form:detail" icon="pi pi-search"
																value="Reordenar" oncomplete="PF('reorderMenu').show()" />
														</f:facet>
														<p:column headerText="Ordem">
															<h:outputText value="#{_menuItem.ordering}" />
														</p:column>
														<p:column headerText="Gcmid">
															<h:outputText value="#{_menuItem.id}" />
														</p:column>
														<p:column headerText="Ativo">
															<p:graphicImage rendered="#{_menuItem.enabled}"
																value="/resources/true.png" />
															<p:graphicImage rendered="#{!_menuItem.enabled}"
																value="/resources/false.png" />
														</p:column>
														<p:column headerText="Nome">
															<h:outputText value="#{_menuItem.name}" />
														</p:column>
														<p:column>
															<p:button title="Editar2" icon="fa fa-edit"
																outcome="/administrator/menu_item_edit">
																<o:pathParam value="0" />
																<o:pathParam value="#{_menuItem.id}" />
															</p:button>
														</p:column>
													</p:treeTable>
												</h:form>
											</p:tab>
										</div>
									</div>
								</div>
							</div>

							<p:tab title="Dados do Menu">
								<h:form id="search">
									<h:panelGrid columnClasses="label,component" columns="3">
										<p:outputLabel for="app" value="App:" />
										<h:panelGroup>
											<p:selectOneMenu label="Extensão"
												converter="omnifaces.SelectItemsConverter" id="app"
												value="#{urlMenuBean.urlMenu.applicationEntity}">
												<f:selectItem />
												<f:selectItems itemLabel="#{_item.name}"
													itemValue="#{_item}" value="#{urlMenuBean.allIdentityApps}"
													var="_item" />
											</p:selectOneMenu>
										</h:panelGroup>
										<h:outputText />
										<h:outputLabel for="nome" value="Nome:" />
										<h:panelGroup>
											<p:inputText id="nome" label="Nome" size="50" maxLength="100"
												required="true" value="#{urlMenuBean.urlMenu.name}" />
										</h:panelGroup>
										<h:outputText />
										<h:outputLabel for="title" value="Título:" />
										<h:panelGroup>
											<p:inputText id="title" label="Título" size="50"
												maxLength="100" required="true"
												value="#{urlMenuBean.urlMenu.title}" />
										</h:panelGroup>
										<h:outputText />
										<h:outputLabel for="order" value="Ordem:" />
										<h:panelGroup>
											<p:inputText id="ordem" label="Ordem" size="50"
												maxLength="100" required="true"
												value="#{urlMenuBean.urlMenu.orderlayer}" />
										</h:panelGroup>
										<h:outputText />
										<h:outputLabel for="descricao" value="Descrição:" />
										<h:panelGroup>
											<p:textEditor allowImages="true" id="descricao"
												value="#{urlMenuBean.urlMenu.description}" height="200">
												<f:facet name="toolbar">
													<span class="ql-formats">
														<button class="ql-bold"></button>
														<button class="ql-italic"></button>
														<button class="ql-underline"></button>
														<button class="ql-strike"></button>
													</span>
													<span class="ql-formats"> <select class="ql-font"></select>
														<select class="ql-size"></select>
													</span>
												</f:facet>
											</p:textEditor>
										</h:panelGroup>
										<h:outputText />
									</h:panelGrid>
									<div class="buttons">
										<h:commandLink value="Salvar" action='#{urlMenuBean.update}'
											styleClass="btn btn-primary" />
										#{''}
										<c:choose>
											<c:when test='#{!empty urlMenuBean.id}'>
												<h:link value="Cancelar"
													outcome="/administrator/menu_search"
													styleClass="btn btn-primary" />
										#{''}
											<h:commandLink value="Excluir" action='#{urlMenuBean.delete}'
													styleClass="btn btn-primary" />
											</c:when>
											<c:otherwise>
												<h:link value="Cancelar"
													outcome="/administrator/menu_search"
													styleClass="btn btn-primary" />
											</c:otherwise>
										</c:choose>
									</div>
								</h:form>
							</p:tab>
						</p:tabView>
					</div>
				</div>
			</div>
		</div>
		</section>
	</ui:define>
</ui:composition>
