<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition template="#{abstractIdentityBean.abstractIdentityEntity.template}/pageTemplate.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="jakarta.faces.core"
	xmlns:h="jakarta.faces.html"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:a="jakarta.faces.passthrough"
	xmlns:c="jakarta.tags.core"
	xmlns:fn="jakarta.tags.functions"
	xmlns:o="http://omnifaces.org/ui"
	xmlns:of="http://omnifaces.org/functions"
	xmlns:p="http://primefaces.org/ui"
	xmlns:k="http://kickoff.example.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions"
    > 
	
	<f:metadata>
		<f:event type="preRenderView" listener='#{layerBean.retrieve}'/>
		<f:viewParam name="id" value='#{layerBean.id}'/> 
	</f:metadata>
			
	<ui:define name="content">
	
    <section class="content">
        <div class="container-fluid">
			
            <div class="row clearfix"> 
                <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12"> 
                    <div class="card">
                        <div class="body">

                <h:form id="SelectedLayerForm">

<p:tabView id="tablayer">
	
	<p:tab title="Registros">
	
	<h:panelGroup id="tablayer"> 	
		<p:commandButton value="Anterior"  rendered="#{layerBean.page8 gt 0}"
			actionListener="#{layerBean.previousPage}"
		 		icon="ui-icon-check" update="tablayer" />
		
		<p:outputLabel id="paginator" styleClass="paginator-content" 	
			value="#{layerBean.page8 * layerBean.pageSize8 + 1} até 
			#{layerBean.page8 * layerBean.pageSize8 + 
			fn:length(layerBean.pageItems8)} (de #{layerBean.count8})"/>
		
		<p:commandButton value="Proximo" rendered="#{(layerBean.page8 + 1) * layerBean.pageSize8 lt layerBean.count8}"
			actionListener="#{layerBean.nextPage}"
		 		icon="ui-icon-check" update="tablayer" />

		<p:inputText a:placeholder="Buscar Nome" styleClass="btn-lg waves-effect"
			value="#{layerBean.nameSearch}"/>
					#{''}
		<p:commandButton icon="fa fa-search" styleClass="button btn-primary btn-lg waves-effect" 
			action="#{layerBean.search8}" update="tablayer" title="Buscar Autor" alt="Buscar Autor"/>

	
		
		<p:dataTable id="tbl1" scrollable="true" scrollHeight="360" 
		emptyMessage="Nenhum registro encontrado!"  var="result" 
		       value="#{layerBean.tableData}" rowIndexVar="rowIndex">
		       <f:facet name="header"></f:facet>
		 	<p:column>
		     	<f:facet name="header">
		        	<h:outputText value="Registros da Camada" />
		        </f:facet>
		         	<p:button  icon="fa fa-edit" title="Exibir" 
						outcome="/administrator/content_view" >
							<f:param name="objectId	" value="#{result['Id'].value}"/>
							<f:param name="layer_id" value="#{layerBean.id}"/>
					</p:button> 
					#{''}
		       	<h:outputText value="#{result['Nome'].value}" />
		       	
		      
		 	</p:column>  
		 
		 	

		</p:dataTable>
		</h:panelGroup>
	
	</p:tab>
	
	
	</p:tabView>


				</h:form>
                        
	               		</div>
                    </div>
                </div>
            </div>
        </div>
    </section>
   
	</ui:define>
	
	 
</ui:composition>
