<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition
	template="#{abstractIdentityBean.abstractIdentityEntity.template}/pageTemplate.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="jakarta.faces.core"
	xmlns:h="jakarta.faces.html"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:a="jakarta.faces.passthrough"
	xmlns:c="jakarta.tags.core"
	xmlns:fn="jakarta.tags.functions"
	xmlns:o="http://omnifaces.org/ui"
	xmlns:of="http://omnifaces.org/functions"
	xmlns:p="http://primefaces.org/ui"
	xmlns:k="http://kickoff.example.org/ui">

	<f:metadata>
		<f:viewParam name="id" value="#{applicationEntityBean.id}" />
		<f:event type="preRenderView" listener="#{applicationEntityBean.retrieve}" />
	</f:metadata>

	<ui:define name="content">
		
		<style>
		.service-box-icon i {
  			width: 85px;
  			height: 85px;
  			line-height: 85px;
  			text-align: center;
  			color: #4f82e9;
  			font-size: 30px;
  		}
		</style>
	
		<section class="slice py-8">
		<div class="container py-5">
			<div class="row clearfix">
				<div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
					<div class="body">
						<p:messages id="messages" showDetail="true" showSummary="false	" />
						<h:form id="idx">
							<p:tabView id="tablayer">
								<p:tab title="Dados">
									<h:panelGrid columnClasses="label,component" columns="3">
										<h:outputLabel for="applicationEntityBeanGlebaNome"
											value="Nome do Projeto:" />
										<h:panelGroup>
											<p:inputText id="applicationEntityBeanGlebaNome"
												label="Nome do Projeto" size="50" maxLength="100"
												required="true"
												value="#{applicationEntityBean.applicationEntity.name}" />
										</h:panelGroup>
										<h:outputText />
										<h:outputLabel for="applicationEntityBeanTitle"
											value="Título:" />
										<h:panelGroup>
											<p:inputText id="applicationEntityBeanTitle" label="Título:"
												size="50" maxLength="100" required="true"
												requiredMessage="O Título é Requerido!"
												value="#{applicationEntityBean.applicationEntity.title}" />
										</h:panelGroup>
										<h:outputText />
																				
										<h:outputLabel for="applicationEntityBeanDescription"
											value="Descrição:" />
										<h:panelGroup>
											<p:textEditor id="applicationEntityBeanDescription"
												value="#{applicationEntityBean.applicationEntity.description}"
												height="200">
												<f:facet name="toolbar">
													<span class="ql-formats">
														<button class="ql-bold"></button>
														<button class="ql-italic"></button>
														<button class="ql-underline"></button>
														<button class="ql-strike"></button>
													</span>
													<span class="ql-formats"> <select class="ql-font"></select>
														<select class="ql-size"></select>
													</span>
												</f:facet>
											</p:textEditor>
										</h:panelGroup>
										<h:outputText />

										<h:outputLabel for="applicationEntityBeanZoom" value="Zoom:" />
										<h:panelGroup>
											<p:inputText id="applicationEntityBeanZoom" label="Zoom:"
												size="50" maxLength="100" required="true"
												value="#{applicationEntityBean.applicationEntity.zoom}" />
										</h:panelGroup>
										<h:outputText />
										<h:outputLabel for="minRes" value="Min. Res:" />
										<h:panelGroup>
											<p:inputNumber id="minRes" label="Min. Res:"
												value="#{applicationEntityBean.applicationEntity.minres}"
												required="true"  placeholder="0.00001"
												minValue="0.00001"
												thousandSeparator=""  decimalSeparator="," 
                                				maxValue="999999.99999" decimalPlaces="5" 
												requiredMessage="Resolução Mínima Requerido!" />
										</h:panelGroup>
										<h:outputText />
										<h:outputLabel for="maxRes" value="Max. Res:" />
										<h:panelGroup>
											<p:inputNumber id="maxRes" label="Max. Res:"
												value="#{applicationEntityBean.applicationEntity.maxres}"
												placeholder="10000"
												minValue="0"
												thousandSeparator=""  decimalSeparator="," 
                                				maxValue="999999" decimalPlaces="0" 
												required="true"
												requiredMessage="Resolução Máxima Requerido!" />
											</h:panelGroup>
										<h:outputText />
										<h:outputLabel for="applicationEntityBeancentroidwkt"
											value="Centro (wkt)" />
										<h:panelGroup>
											<p:inputText id="applicationEntityBeancentroidwkt"
												label="Centro (wkt)" size="50" maxLength="100"
												required="true"
												value="#{applicationEntityBean.applicationEntity.centroidwkt}" />
										</h:panelGroup>
										<h:outputText />
										<h:outputLabel for="applicationEntityBeanGlebaMC"
											value="EPSG:" />
										<h:panelGroup>
											<p:selectOneMenu label="epsg" 
												required="true" id="epsg"
												value="#{applicationEntityBean.applicationEntity.epsg}">
												<f:selectItem
													itemLabel="#{applicationEntityBean.applicationEntity.epsg}"
													itemValue="#{applicationEntityBean.applicationEntity.epsg}" />
												<f:selectItems itemLabel="#{_item.srid}"
													itemValue="#{_item}" value="#{epsgBean.all}" var="_item" />
											</p:selectOneMenu>
										</h:panelGroup>
										<h:outputText />
									</h:panelGrid>
									<div style="text-align: right">
										<p:commandButton ajax="true" value="Processar"
											action='#{applicationEntityBean.processProjectBasic}'
											icon="ui-icon-home" />
										#{''}
										<p:commandButton ajax="false" value="Salvar" update="messages"
											action='#{applicationEntityBean.update33}'
											icon="ui-icon-home" />
										#{''}
										<c:choose>
											<c:when test='#{!empty applicationEntityBean.id}'>
												<p:commandButton icon="fa fa-trash-o" value="Excluir"
													actionListener="#{applicationEntityBean.delete}"
													update="messages">
													<p:confirm header="Confirmation"
														message="Confirma Exclusao Completa do Projeto e seus Objetos?"
														icon="ui-icon-alert" />
												</p:commandButton>
												<p:confirmDialog global="true">
													<p:commandButton value="Sim" update="messages"
														action="#{applicationEntityBean.delete}" type="button"
														styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
													<p:commandButton value="Não" type="button"
														styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
												</p:confirmDialog>
											</c:when>
											<c:otherwise>
												<p:button value="Cancelar" outcome="/index"
													icon="ui-icon-home" />
											</c:otherwise>
										</c:choose>
									</div>
								</p:tab>
								<p:tab title="Attributos">
								
									<p:dataTable id="attrib" emptyMessage="Nenhum attributo encontrado!" 
									var="_attribute" value="#{applicationEntityBean.applicationEntity.attributes}"
									rowIndexVar="rowIndex" reflow="true">
										<p:column>
											<f:facet name="header">
												<h:outputText value="Nome" />
											</f:facet>
											<h:outputText value="#{_attribute.name}" />
										</p:column>
										<p:column>
											<f:facet name="header">
												<h:outputText value="Tipo" />
											</f:facet>
											<h:outputText value="#{_attribute.dtype}" />
										</p:column>
										<p:column>
											<f:facet name="header">
												<h:outputText value="Valor" />
											</f:facet>
											<h:outputText value="#{_attribute.value}" />
										</p:column>
										
										<p:column>
											<f:facet name="header">
												<h:outputText value="Ação" />
											</f:facet>
											<p:commandButton icon="pi pi-trash" value="Editar"
									action="#{applicationEntityBean.deleteObject}"
									oncomplete="PF('editDialog').show()" />
										</p:column>
									</p:dataTable>
								</p:tab>
								<p:tab title="Camadas">
									<p:dataTable id="layer" reflow="true" emptyMessage="Nenhuma Camada encontrada!"
										var="_layer" value="#{applicationEntityBean.applicationEntity.layers}">
										<p:column>
											<f:facet name="header">
												<h:outputText value="Id" />
											</f:facet>
											
											<h:outputLabel value="#{_layer.id}" />
												
											
											
                        					   
										</p:column>
										<p:column>
											<f:facet name="header">
												<h:outputText value="Nome" />
											</f:facet>
											<h:outputText value="#{_layer.name}" />
										</p:column>
										
										<p:column>
											<f:facet name="header">
												<h:outputText value="Tipo" />
											</f:facet>
											<h:outputText value="#{_layer.dtype}" />
										</p:column>

									</p:dataTable>
								</p:tab>
								<p:tab title="Compartilhamentos">
									<p:dataTable id="shared" reflow="true"
										emptyMessage="Nenhum compartilhamento encontrado!"
										var="_shared" value="#{applicationEntityBean.applicationEntity.shareds}">
										<p:column>
											<f:facet name="header">
												<h:outputText value="Nome" />
											</f:facet>
											<ui:repeat var="image"
												value="#{_shared.person.attributes.stream().filter(car->car.name.equals('picture') and !car.temp).toList()}">
												<p:graphicImage style="width: 50px" rendered="#{image != null}"
													class="img-circle js-animating-object img-responsive"
													value="#{image.value}" />
											</ui:repeat>
											
										</p:column>
										
										<p:column>
											<f:facet name="header">
												<h:outputText value="Nome" />
											</f:facet>
											<h:outputText value="#{_shared.person.username}" />
										</p:column>
										<p:column>
											<f:facet name="header">
												<h:outputText value="Permissão" />
											</f:facet>
											<h:outputText value="#{_shared.appRole}" />
										</p:column>
									</p:dataTable>
								</p:tab>
							</p:tabView>
						</h:form>
					</div>
				</div>
			</div>
		</div>
		</section>
		
			<p:sidebar position="right" blockScroll="true"
			style="overflow-y: scroll; 
			width:80% !important; height:100%px !important;"
			widgetVar="editDialog">
			<br />
			<h:form id="editDialogForm">
			
			<h:panelGrid columnClasses="label,component" columns="3">
										<h:outputLabel for="nameProj"
											value="Nome do Atributo:" />
										<h:panelGroup>
											<p:inputText id="nameProj"
												label="Valor do Atributo" size="50" maxLength="100"
												required="true"
												value="#{applicationEntityBean.applicationEntity.name}" />
										</h:panelGroup>
										<h:outputText />
										
										</h:panelGrid>
										
			
			</h:form>
			</p:sidebar>
			
		
	</ui:define>
</ui:composition>
