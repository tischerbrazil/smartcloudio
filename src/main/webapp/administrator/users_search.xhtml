<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition
	template="#{abstractIdentityBean.abstractIdentityEntity.template}/pageTemplate.xhtml"

	
		xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="jakarta.faces.core"
	xmlns:h="jakarta.faces.html"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:a="jakarta.faces.passthrough"
	xmlns:c="jakarta.tags.core"
	xmlns:fn="jakarta.tags.functions"
	xmlns:o="http://omnifaces.org/ui"
	xmlns:of="http://omnifaces.org/functions"
	xmlns:p="http://primefaces.org/ui"
	xmlns:k="http://kickoff.example.org/ui"
	
	
	>
	<ui:define name="content">
		<section class="slice py-8">
		<div class="container py-5">
			<div class="row clearfix">
				<div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
					<div class="body">
						<p:growl showDetail="true" escape="false" id="messages"
							life="3000" />

						
<k:form id="usersForm" fieldset="false">
			<k:table id="usersTable" value="#{usersBacking.model}" filterable="false" updateQueryString="false" searchable="false"
			exportable="false">
				<k:column field="id" type="number" />
				<k:column field="email"  />
				<k:column field="emailVerified" type="boolean" visible="false" />
				<k:column field="firstName" visible="false" />
				<k:column field="lastName" visible="false" />
			
				<k:column field="groups" type="list" sortable="false" />
			
				<k:column field="lastModified" type="instant" visible="false" />

				<p:column headerText="#{i18n['general.actions']}" styleClass="actions">
					<k:link path="admin/users/edit" value="">
					<i class="pi pi-pencil" />
						<f:param name="id" value="#{item.id}" />
					</k:link>
					<p:commandLink id="delete" rendered="#{item.id gt 1}"
						onclick="if(!confirm('Are you sure to delete user with ID #{item.id}?'))return false" 
						action="#{usersBacking.delete(item)}" update="@form"><i class="pi pi-trash" />
					</p:commandLink>
				</p:column>
			</k:table>
		</k:form>

						
					</div>
				</div>
			</div>
		</div>
		</section>
	</ui:define>
</ui:composition>
