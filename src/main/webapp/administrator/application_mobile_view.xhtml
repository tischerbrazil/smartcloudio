<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition
	template="#{abstractIdentityBean.abstractIdentityEntity.template}/pageTemplate.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="jakarta.faces.core"
	xmlns:h="jakarta.faces.html"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:a="jakarta.faces.passthrough"
	xmlns:c="jakarta.tags.core"
	xmlns:fn="jakarta.tags.functions"
	xmlns:o="http://omnifaces.org/ui"
	xmlns:of="http://omnifaces.org/functions"
	xmlns:p="http://primefaces.org/ui"
	xmlns:k="http://kickoff.example.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">

	<f:metadata>
		<f:event type="preRenderView"
			listener='#{applicationMobileBean.retrieve}' />
		<f:viewParam name="id" value='#{applicationMobileBean.id}' />
	</f:metadata>

	<ui:define name="content">
		<section class="slice py-8">
		<div class="container py-5">
			<div class="row clearfix">
				<div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
					<div class="body">
						<h:form id="search">
							<p:messages id="messages" showDetail="true" showSummary="true" />

							<h:panelGrid columnClasses="label,component" columns="2">
								<h:outputLabel value="Nome: " />
								<h:outputLabel
									value="#{applicationMobileBean.applicationIdentityEntity.name}" />
							</h:panelGrid>

							<div align="right">



								<p:menuButton value="Adicionar Componente"
									icon="ui-icon-document">
									<p:menuitem ajax="false" outcome="/administrator/component_edit" value="Post"
										icon="ui-icon-document" id="post">
										<f:param name="component_type" value="post" />
										<f:param name="identity_id"
											value="#{applicationMobileBean.id}" />
									</p:menuitem>

									<p:menuitem ajax="false" outcome="/administrator/component_edit"
										value="Carousel" icon="ui-icon-document" id="carousel">
										<f:param name="component_type" value="carousel" />
										<f:param name="identity_id"
											value="#{applicationMobileBean.id}" />
									</p:menuitem>

									<p:menuitem ajax="false" outcome="/administrator/component_edit"
										value="Banner" icon="ui-icon-document" id="banner">
										<f:param name="component_type" value="banner" />
										<f:param name="identity_id"
											value="#{applicationMobileBean.id}" />
									</p:menuitem>

									<p:menuitem ajax="false" outcome="/administrator/component_edit"
										value="Custom" icon="ui-icon-document" id="custom">
										<f:param name="component_type" value="custom" />
										<f:param name="identity_id"
											value="#{applicationMobileBean.id}" />
									</p:menuitem>

									<p:menuitem ajax="false" outcome="/administrator/component_edit" value="Card"
										icon="ui-icon-document" id="card">
										<f:param name="component_type" value="card" />
										<f:param name="identity_id"
											value="#{applicationMobileBean.id}" />
									</p:menuitem>

								</p:menuButton>


							</div>

							<p:tabView id="tabapp">

								<p:tab title="Components">

									<div align="right"></div>

									<p:dataTable emptyMessage="Nenhum Componente encontrado!"
										id="comp"
										value="#{applicationMobileBean.applicationIdentityEntity.components}"
										var="_comp" paginatorPosition="bottom" paginator="true"
										rows="50">
										<f:facet name="header">
											<h:outputText value="Componentes" />
										</f:facet>

										<p:column>
											<f:facet name="header">
												<h:outputText value="Id" />
											</f:facet>
											<h:outputText value="#{_comp.id}" />
										</p:column>

										<p:column>
											<f:facet name="header">
												<h:outputText value="Tipo" />
											</f:facet>
											<h:outputText value="#{_comp.dtype}" />
										</p:column>

										<p:column>
											<f:facet name="header">
												<h:outputText value="Nome" />
											</f:facet>
											<h:outputText value="#{_comp.name}" />
										</p:column>

										<p:column>
											<f:facet name="header">
												<h:outputText value="Tipo" />
											</f:facet>
											<h:outputText value="#{_comp.dtype}" />
										</p:column>

										<p:column>
											<f:facet name="header">
												<h:outputText value="UUID" />
											</f:facet>
											<h:outputText value="#{_comp.uuid}" />
										</p:column>

										<p:column>
											<f:facet name="header">
												<h:outputText value="Ação" />
											</f:facet>
											<p:button icon="fa fa-th-list" title="Exibir"
												outcome="/administrator/component_view">
												<f:param name="id" value="#{_comp.uuid}" />
											</p:button>
												#{''} 
												<p:button icon="fa fa-edit" title="Editar"
												outcome="/administrator/component_edit">
												<f:param name="id" value="#{_comp.uuid}" />
											</p:button>

										</p:column>

									</p:dataTable>

								</p:tab>

								<p:tab title="Atributos">
									<p:dataTable emptyMessage="Nenhum item encontrado!" id="apps"
										value="#{applicationMobileBean.applicationIdentityEntity.attributes}"
										var="_attribute" paginatorPosition="bottom" paginator="true"
										rows="50">
										<f:facet name="header">
											<h:outputText value="ATTRIBUTOS" />
										</f:facet>

										<p:column>
											<f:facet name="header">
												<h:outputText value="Nome" />
											</f:facet>
											<h:outputText value="#{_attribute.name}" />
										</p:column>

										<p:column>
											<f:facet name="header">
												<h:outputText value="Valor" />
											</f:facet>
											<h:outputText value="#{_attribute.value}" />
										</p:column>






									</p:dataTable>

								</p:tab>



								<p:tab title="Info">



									<h:panelGrid columnClasses="label,component" columns="3">

										<h:outputLabel for="nome" value="Nome:" />
										<h:panelGroup>
											<p:inputText id="nome" label="Nome" required="true"
												value="#{applicationMobileBean.applicationIdentityEntity.name}" />
										</h:panelGroup>
										<h:outputText />

										<h:outputLabel for="Locale" value="Local:" />
										<h:panelGroup>
											<p:inputText id="locale" label="Locale"
												value="#{applicationMobileBean.applicationIdentityEntity.locale}" />
										</h:panelGroup>
										<h:outputText />

										<h:outputLabel for="image" value="Image:" />
										<h:panelGroup>
											<p:inputText id="image" label="Locale"
												value="#{applicationMobileBean.applicationIdentityEntity.image}" />
										</h:panelGroup>
										<h:outputText />


										<h:outputLabel for="template" value="Template:" />
										<h:panelGroup>
											<p:inputText id="template" label="Template"
												value="#{applicationMobileBean.applicationIdentityEntity.template}" />
										</h:panelGroup>
										<h:outputText />


										<h:outputLabel for="desc" value="Descrição:" />
										<h:panelGroup>
											<p:inputText id="desc" label="Descrição"
												value="#{applicationMobileBean.applicationIdentityEntity.description}" />
										</h:panelGroup>
										<h:outputText />

										<h:outputLabel for="default" value="Padrão" />
										<p:selectBooleanCheckbox required="true" locale="pt_BR"
											label="Default" id="default"
											value="#{applicationMobileBean.applicationIdentityEntity.default}" />
										<h:outputText />

										<h:outputLabel for="enabled" value="Ativo" />
										<p:selectBooleanCheckbox required="true" locale="pt_BR"
											label="Tipo" id="enabled"
											value="#{applicationMobileBean.applicationIdentityEntity.enabled}" />
										<h:outputText />

										<p:outputLabel value="Cliente" />
										<h:panelGroup>
											<p:selectOneMenu label="Cliente" required="true"
												converter="omnifaces.SelectItemsConverter" id="client"
												value="#{applicationMobileBean.applicationIdentityEntity.clientEntity}">
												<f:selectItems itemLabel="#{_item.clientId}"
													itemValue="#{_item}" value="#{clientBean.all}" var="_item" />
											</p:selectOneMenu>
										</h:panelGroup>
										<h:outputText />

									</h:panelGrid>

									<div class="buttons">
										<h:commandLink value="Salvar"
											action='#{applicationMobileBean.update}' update="messages"
											styleClass="btn btn-primary" />
										#{''}
										<c:choose>
											<c:when test='#{!empty applicationMobileBean.id}'>
												<h:link value="Cancelar" outcome="/administrator/application_mobile_search"
													styleClass="btn btn-primary" />
						#{''}
						<h:commandLink value="Excluir"
													action='#{applicationMobileBean.delete}'
													styleClass="btn btn-primary" />
											</c:when>
											<c:otherwise>
												<h:link value="Cancelar" outcome="/administrator/application_mobile_search"
													styleClass="btn btn-primary" />
											</c:otherwise>
										</c:choose>
									</div>
								</p:tab>
							</p:tabView>
						</h:form>
					</div>
				</div>
			</div>
		</div>
		</section>

	</ui:define>


</ui:composition>
