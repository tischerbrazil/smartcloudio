          				<h:form id="point2Form">

	 <p:contextMenu for="mapcontext">

        <p:menuitem rendered="false" onclick="deleteFeature()" value="Excluir" icon="fa fa-trash" />
    </p:contextMenu>
				<p:remoteCommand name="objEdit"
					oncomplete="PF('editPointDialog').show();"

  	  				oncomplete="$('.button-collapse').sideNav('show');"
  	  				actionListener="#{applicationEntityBean.beanMethodView}" />
  	  				
  	  			<p:commandLink value=""  id="printEdit2" update=":printForm:iiii" oncomplete="PF('printDialog').show();" >

  				</p:commandLink>

		<h:panelGroup id="mapcontext">

		class="btnMenu btn-floating btn-large waves-effect waves-light red">

	</h:panelGroup>
		
	<h:panelGroup onclick="editFeaturePrint()" rendered="true" layout="block" id="btnEdit" 
		class="btnMenu btn-floating btn-large waves-effect waves-light red">

	</h:panelGroup>
