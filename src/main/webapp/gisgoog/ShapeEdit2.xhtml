<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:s="http://jboss.org/schema/seam/taglib"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:f="jakarta.faces.core"
    xmlns:h="jakarta.faces.html"
    xmlns:c="http://java.sun.com/jsp/jstl/core"
    
    xmlns:o="http://omnifaces.org/ui"
	xmlns:of="http://omnifaces.org/functions"
	xmlns:pe="http://primefaces.org/ui/extensions"
    xmlns:p="http://primefaces.org/ui">  
	<h:form id="pointForm">
                 
    <p:growl id="growl" sticky="true" showDetail="true"/>
  
    <p:wizard id="thePanel" widgetVar="myWizard"  showNavBar="true" showStepStatus="true" nextLabel="Imagem" 
    backLabel="Dados" flowListener="#{projectRuralEntityBean.onFlowProcess}">
        <p:tab id="personal" title="Início" >
                <p:messages />
                <h:panelGrid columns="2" columnClasses="label, value">
              	<h:panelGroup id="display">
    <p:messages id="messages" showSummary="true"/>

     <pe:dynaForm id="dynaForm" value="#{projectRuralEntityBean.model}" var="data" columnClasses="label-container, field-container">
        
         <f:facet align="left"  name="buttonBar">
            <p:commandButton value="Salvar" action="#{projectRuralEntityBean.submitForm}" 
            process="dynaForm"  update=":pointForm:display" 
            oncomplete="handleComplete(xhr, status, args);fetchData();"  />
        	
        	<p:commandButton value="Excluir" action="#{projectRuralEntityBean.deleteObject}" 
        	process="dynaForm" update=":pointForm:display"   
        	oncomplete="PF('editPointDialog').hide();fetchData();" />
            
            <p:commandButton value="Cancelar" process="dynaForm"  oncomplete="PF('editPointDialog').hide();" />
        </f:facet>
        
        <pe:dynaFormControl  type="hidden">
            <h:inputHidden id="hidden" value="#{data.value}" required="#{data.required}"/>
        </pe:dynaFormControl>
        
       
         <pe:dynaFormControl type="fileupload">
         
        <p:fileUpload  locale = "pt_BR" 
        
         cancelLabel="Cancelar"  uploadLabel="Enviar"        
            label="Enviar"
            skinSimple="true"
	        mode="advanced" dragDropSupport="true"
           allowTypes="/(\.|\/)(png|PNG|jpg|JPG|gif|GIF)$/" />
        </pe:dynaFormControl>

        <pe:dynaFormControl  type="booleanchoice">
            <p:selectBooleanCheckbox  value="#{data.value}" required="#{data.required}"/>
        </pe:dynaFormControl>
        
        <pe:dynaFormControl type="input" for="txt">
         	<p:inputText  id="txt" width="10"  value="#{data.value}" required="#{data.required}" />
        </pe:dynaFormControl>
        
        <pe:dynaFormControl type="texteditor" for="texto">
         	<p:textEditor  id="texto"  value="#{data.value}" height="270" width="33" >
         	 <f:facet name="toolbar">
             <span class="ql-formats">
                <button class="ql-bold"></button>
                <button class="ql-italic"></button>
                <button class="ql-underline"></button>
                <button class="ql-strike"></button>
            </span>
            <span class="ql-formats">
                <select class="ql-font"></select>
                <select class="ql-size"></select>
            </span>
        	</f:facet>
         	</p:textEditor>
        </pe:dynaFormControl>
        
        <pe:dynaFormControl type="calendar" for="cal" styleClass="calendar">
            <p:calendar id="cal" value="#{data.value}" required="#{data.required}" showOn="button"/>
        </pe:dynaFormControl>
        
        <pe:dynaFormControl type="selectcat" for="selcat">
            <p:selectOneMenu id="selcat" value="#{data.value}" required="#{data.required}">
                <f:selectItems value="#{projectRuralEntityBean.languagesCat}"/>
            </p:selectOneMenu>
        </pe:dynaFormControl>
        
        <pe:dynaFormControl type="select" for="sel">
            <p:selectOneMenu id="sel" value="#{data.value}" required="#{data.required}">
                <f:selectItems value="#{projectRuralEntityBean.languages}"/>
            </p:selectOneMenu>
        </pe:dynaFormControl>
        
        <pe:dynaFormControl type="textarea" for="tarea">
            <p:inputTextarea id="tarea" value="#{data.value}" required="#{data.required}" autoResize="false"/>
        </pe:dynaFormControl>
        <pe:dynaFormControl type="rating" for="rat">
            <p:rating id="rat" value="#{data.value}" required="#{data.required}"/>
        </pe:dynaFormControl>
        
        <pe:dynaFormControl type="radiochoice">
            <p:selectOneRadio value="#{data.value}" required="#{data.required}">
                <f:selectItems value="#{data.selectItems}"/>
            </p:selectOneRadio>
        </pe:dynaFormControl>
        
         <pe:dynaFormControl  type="img">
          	<p:graphicImage width="240" value="#{data.value}" required="#{data.required}" />
        </pe:dynaFormControl>
       
    </pe:dynaForm>
        
    </h:panelGroup>
    </h:panelGrid>
      <hr/>
    </p:tab>

    <p:tab id="confirm" title="Imagem">
           <h:panelGrid id="confirmation" columns="3" columnClasses="grid,grid,grid">
                    <h:panelGrid columns="2" columnClasses="label, value">

    <h:form id="uploadShpForm" prependId="false">
	
	<h:panelGroup   id="entrada">

    <p:fileUpload   
    
    cancelLabel="Cancelar" label="Arquivo" uploadLabel="Enviar" update="uploadShpForm" oncomplete="PF('editPointDialog').hide();fetchData();"  
    listener="#{projectRuralEntityBean.importIMAGE}" mode="advanced" dragDropSupport="false"
         allowTypes="/(\.|\/)(jpg|JPG|png|PNG|gif|GIF)$/" />

	<div style="clear:both"/>
</h:panelGroup>
</h:form>	   
                    </h:panelGrid>
                </h:panelGrid>
	        <hr/>
        </p:tab>
    </p:wizard>
	</h:form>

	 <h:outputScript id="dynaFormScript" target="body">
	/* <![CDATA[ */
    function handleComplete(xhr, status, args) {
        if(args && args.isValid) {
            PF('editPointDialog').hide();
        } else {
            PF('editPointDialog').show();
        }
    }
	/* ]]> */
</h:outputScript>  
</ui:composition>
