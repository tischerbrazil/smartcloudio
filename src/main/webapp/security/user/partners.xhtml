<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="jakarta.faces.html"
	xmlns:f="jakarta.faces.core"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:c="jakarta.tags.core"
	xmlns:o="http://omnifaces.org/ui"
	
	xmlns:pt="jakarta.faces.passthrough"
	xmlns:p="http://primefaces.org/ui"
	template="#{abstractIdentityBean.abstractIdentityEntity.template}/pageTemplate.xhtml">


	

	<ui:define name="main">

		<style>
.inline-block {
	display: inline-block;
}

.inline-block2 {
	display: inline-block;
	vertical-align: top;
}
</style>

		<section class="slice py-8">
        <div class="container py-5">
			<div class="row clearfix">
				<div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
					
					 <div class="header">
                         <div class="row clearfix">
                         	<div class="col-md-4">
                                 <h4>Parceiros</h4> 
                            </div>
                      	</div>
                      </div>          

						<o:form id="form">
							<op:dataTable  searchPlaceholder="" searchButtonLabel="Buscar"
							currentPageReportSuffix="Registros"	currentPageReportPrefix="Exibindo"
							currentPageReportTemplate="{startRecord} até {endRecord} de {totalRecords}"
							 rowsPerPage="50" rows="50" id="table"
								value="#{partnerBean.lazyPartners}" searchable="true"
								selectable="true">
								<f:attribute name="reflow" value="#{true}" />
								
				
					

								<op:column head="Código" field="id" />

								
					
					<p:column>
					<f:facet name="header">
						<h:outputText value="Parceiros Comerciais"/>
					</f:facet>
						<h:outputText id="_status" value="1"/>
						
					
					</p:column>
					
					
	<op:column head="Código" field="name" />
	



								<p:column>
									<f:facet name="header">
										<h:outputText value="Exibir" />
									</f:facet>
									<p:button outcome="/security/complete" icon="fa fa-edit"
										styleClass="button btn-warning btn-lg waves-effect">
										<f:param name="id" value="#{item.uuid}" />
									</p:button>
					#{''}
					<p:button outcome="/security/search" icon="fa fa-file-text"
										styleClass="button btn-primary btn-lg waves-effect">
										<f:param name="id" value="#{item.uuid}" />
									</p:button>
								</p:column>

							</op:dataTable>




						</o:form>


						
						


					</div>
				</div>
			</div>
		

		</section>



	</ui:define>
</ui:composition>
