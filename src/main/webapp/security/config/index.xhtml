<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition
	template="#{abstractIdentityBean.abstractIdentityEntity.template}/pageTemplate.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="jakarta.faces.core"
	xmlns:h="jakarta.faces.html"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:a="jakarta.faces.passthrough"
	xmlns:c="jakarta.tags.core"
	xmlns:fn="jakarta.tags.functions"
	xmlns:o="http://omnifaces.org/ui"
	xmlns:of="http://omnifaces.org/functions"
	xmlns:p="http://primefaces.org/ui"
	xmlns:k="http://kickoff.example.org/ui">

	<f:metadata>
		<f:viewParam name="page" value='#{clientBean.page}' />
		<f:event type="preRenderView" listener='#{clientBean.paginate}' />
	</f:metadata>

	<ui:define name="content">
		<section class="slice py-8">
		<div class="container py-5">
			<div class="row clearfix">
				<div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
					<div class="card">
						<p:dataTable id="clientBeanPageItems" styleClass="data-table"
							value="#{clientBean.pageItems}" var="_item" reflow="true">
							<p:column>
								<f:facet name="header">
									<h:outputText value="Ativo" />
								</f:facet>
								<p:graphicImage rendered="#{_item.enabled}" class="img-circle"
									value="/resources/true.png" />

								<p:graphicImage rendered="#{!_item.enabled}" class="img-circle"
									value="/resources/false.png" />
							</p:column>
							
							
							
							
							
							<p:column>
										<f:facet name="header">
											<h:outputText value="Nome" />
										</f:facet>
										<p:outputLabel value="#{_item.clientId}" />
									</p:column>
									
									
									<p:column>
										<f:facet name="header">
											<h:outputText value="Nome" />
										</f:facet>
										<p:outputLabel value="#{_item.clientId}" />
									</p:column>
									
									
									<p:column>
										<f:facet name="header">
											<h:outputText value="Client Type" />
										</f:facet>
										<p:outputLabel value="#{_item.dtype}" />
									</p:column>
							
						</p:dataTable>
					</div>
				</div>
			</div>
		</div>
		</section>
	</ui:define>
</ui:composition>
