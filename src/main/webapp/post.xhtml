<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="jakarta.faces.html"
	xmlns:f="jakarta.faces.core"
	xmlns:ui="jakarta.faces.facelets"
    xmlns:c="jakarta.tags.core"
    xmlns:pt="jakarta.faces.passthrough"   
	xmlns:p="http://primefaces.org/ui" template="#{abstractIdentityBean.abstractIdentityEntity.template}/pageTemplate.xhtml">
	<f:metadata>
		<f:event type="preRenderView" listener='#{abstractGeometryBean.retrieve}'/>
		<f:viewParam name="id" value='#{abstractGeometryBean.id}'/> 
		<f:viewParam name="layer_id" value='#{abstractGeometryBean.layer_id}'/>
	</f:metadata>
	
	
	
    <ui:define name="content">
    
    <style>
    	.img3 {
  			border: 1px solid #ddd;
  			border-radius: 4px;
  			padding: 5px;
		}
	</style>

   <section class="slice py-8">
		<div class="container py-5">
			
            <div class="row clearfix"> 
                <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12"> 
                    <div class="card1">
                        <div class="body">
 							<h:form>
							<ui:repeat id="contentBeanPageItems" var="_itemData"
	       					value="#{abstractGeometryBean.tableDataShape}" >
	       					
                        		<div>
                        		
                        		<h3>#{_itemData['Nome'].value}</h3>
                        		
                        		<h4><h:outputLabel escape="false" value="#{_itemData['title'].value}"/></h4>
                        		
                        		<hr/>
                        		
                        		<p:graphicImage rendered="#{_itemData['Imagem'].value != null}" value="#{_itemData['Imagem'].value}"  
                        			class="img3 content_img js-animating-object img-responsive pull-right" />
	       						 
								<h:outputText escape="false" value="#{_itemData['description'].value}" />
								
								<h:outputText escape="false" value="#{_itemData['Descrição'].value}" />
		
								</div>
                			</ui:repeat>
                			<hr/>
                			<div align="center">
              				<p:button class="btn btn-primary"  
		 	 					outcome="/index" style="margin-left: 10px"  value="VOLTAR">
		 	 				</p:button>	
		 	 				</div>
							</h:form>
	               		</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- FOOTER -->
 
  
    </section>
	</ui:define>
</ui:composition>
