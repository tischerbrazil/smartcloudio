			function handleAddLayer(xhr, status, args) {
				if (!args.validationFailed) {
					
					PF('wiz').loadStep('personal', false);
					PF('addLayerDialog').hide();
					console.info("-555-sTART--- ");

					console.info("-NAME LAYER---------- " + args.namelayer);
					console.info("-TYPE LAYER---------- " + args.typelayer);
					console.info("-STRINGS LAYER------- " + args.stringslayer);
					console.info("-LABEL STYLE LAYER--- " + args.lstylelayer);
					console.info("-GEOM STYLE LAYER---- " + args.gstylelayer);
					
					console.info("-LABEL STYLE LAYER--1- " + args.labelstylejson);
					console.info("-GEOM STYLE LAYER---2- " + args.geomstylejson);

					
			        addWmsLayer(args.namelayer,  args.typelayer, args.stringslayer);
			    	console.info("111-END -sTART--- " );	
					fetchData33();
					console.info("222-END -sTART--- " );	
					changeLayerStyle33('l' + args.namelayer + '-' + args.typelayer, args.labelstylejson,  args.geomstylejson);
					console.info(" OKsTART-777-- ");
				}
			}

			function handleAddLayerRaster(xhr, status, args) {
				if (args.validationFailed) {
				} else {
					PF('addLayerDialogRaster').hide();
					console.info("-NAME LAYER--- " + args.namelayer);
					console.info("-TYPE LAYER--- " + args.typelayer);
					console.info("-STRINGS LAYER-- " + args.stringslayer);
					addWmsLayer(args.namelayer, args.typelayer, args.stringslayer);
					console.info("1-END -sTART--- " );	
					fetchData33();
				
					console.info(" OKsTART-RASTER-- ");
				}
			}

			
			function handleGeomStatusRequest(xhr, status, args) {
				if (!args.validationFailed) {
					PF('editobra2Dialog').hide();
					if (args.classLayer == "LayerEntity"){
						fetchData333('l' + args.namelayer + '-' + args.typelayer);
					}
				}
			} 
			
			
			
			function handleLayerEditRequest(xhr, status, args) {
				if (args.validationFailed) {
					PF('editlayerDialog').jq.effect("shake", {
						times : 15
					}, 100); 
				} else {
					PF('editlayerDialog').hide();
					if (args.classLayer == "LayerEntity"){
						changeLayerStyle33('l' + args.namelayer + '-' + args.typelayer, args.lstylelayer,  args.gstylelayer);
					}
					refreshLayer('l' + args.namelayer + '-' + args.typelayer);
				}
			}
			
			function handleLayerDeleteRequest(xhr, status, args) {
				if (!args.validationFailed) {
					
					PF('editlayerDialog').hide();
					
					console.info("------------- DELETE LAYER ----------------");
				}
			}
			
			function handleComplete333(xhr, status, args) {
				if (!args.validationFailed) {
					PF('editPointDialog').hide();
					console.info('-----------OPA--------------- ' + args.nomeobject);
					console.info('-----------OPA--------------- ' + args.idobject);
					console.info('-----------OPA--------------- ' + args.layerobject);
	      		 	renameFeature(args.layerobject, args.idobject, args.nomeobject);
				}
			}
			
			
			
			
			
			function handleOrderLayersGroup(xhr, status, args) {
				if (args.validationFailed) {
					console.info(" -- ERROR -- ");
				} else {
					var layersGroup = JSON.parse(args.layersGroup); 
					fetchDataLAYERIDGROUP(args.layerString , layersGroup);
				}
			}
			
			function handleOrderLayers(xhr, status, args) {
				console.info(" -- GOD IS TRUST -1- ");
				if (args.validationFailed) {
					console.info(" -- ERROR -- ");
				} else {
					console.info(" -- GOD IS TRUST -- ");
					var layersRoot = JSON.parse(args.layersRoot); 
			
					console.info(" -- 1--- " + layersRoot[0]);
					console.info(" -- 2--- " + layersRoot[1]);
					console.info(" -- 3 -- " + layersRoot[2]);
					console.info(" -- 4 -- " + layersRoot[3]);
					console.info(" -- 5 -- " + layersRoot[4]);
					console.info(" -- 6 -- " + layersRoot[5]);
					console.info(" -- 7 -- " + layersRoot[6]);
					console.info(" -- 8 -- " + layersRoot[7]);
		
					
					
					fetchDataLAYERID(layersRoot);
				}
			}
			
			
			

	
				
				
    			
    
    
    			function handleChangeVisible(xhr, status, args) {
				if (!args.validationFailed) {
					visibleLayer(args.layerId, args.visible);
				}
			}
    
    			function handleChangeOpacity(xhr, status, args) {
				if (!args.validationFailed) {
					opacityLayer(args.layerId, args.opacity);
				}
			}
