<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="jakarta.faces.html"
	xmlns:f="jakarta.faces.core"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:c="jakarta.tags.core"
	xmlns:pt="jakarta.faces.passthrough"
	xmlns:pe="http://primefaces.org/ui/extensions"
	xmlns:p="http://primefaces.org/ui" 
	xmlns:o="http://omnifaces.org/ui"
	template="#{abstractIdentityBean.abstractIdentityEntity.template}/pageTemplate.xhtml">

	<ui:define name="header">
	
	<c:forEach varStatus="loop20" items="#{abstractIdentityBean.moduleFiltersAll.stream().filter(t -> t.htmltag == 'header').toList()}"
			var="modulox20">
			<f:subview id="thing20_#{loop20.index}">
				<ui:include src="#{modulox20.complete}">
					<ui:param name="id"	value="#{modulox20.components.at('/id').asText()}" />
					<ui:param name="uuid" value="#{abstractIdentityBean.uuid}" />
					<ui:param name="type" value="#{modulox20.type}" />
					<ui:param name="viewid" value="thing20_#{loop20.index}" />
					
			
					
					<ui:param name="cgmid" value="#{abstractIdentityBean.gcmid}" />
					<ui:param name="compjson" value="#{modulox20.compJson}" />
					<ui:param name="fields" value="#{modulox20.fields}" />
					<ui:param name="block" value="#{modulox20.block}" />
				</ui:include>
			</f:subview>
		</c:forEach>
	</ui:define>
	
	<ui:define name="content">

		<p:growl skipDetailIfEqualsSummary="true" id="messages" showSummary="true"  
		showDetail="true" >  <p:autoUpdate/>
		</p:growl>
						
		<c:forEach varStatus="loop10"
			items="#{abstractIdentityBean.moduleFiltersAll.stream().filter(t -> t.htmltag == 'main').toList()}"
			var="modulox10">
			<f:subview id="thing10_#{loop10.index}">
				<ui:include src="#{modulox10.complete}">
					<ui:param name="id"	value="#{modulox10.components.at('/id').asText()}" />
					<ui:param name="uuid" value="#{abstractIdentityBean.uuid}" />
					<ui:param name="type" value="#{modulox10.type}" />
					<ui:param name="viewid" value="thing10_#{loop10.index}" />
					<ui:param name="cgmid" value="#{abstractIdentityBean.gcmid}" />
					<ui:param name="compjson" value="#{modulox10.compJson}" />
					<ui:param name="fields" value="#{modulox10.fields}" />
					<ui:param name="block" value="#{modulox10.block}" />
				</ui:include>
			</f:subview>
		</c:forEach>
		
		<c:forEach varStatus="loop"
			items="#{abstractIdentityBean.moduleFiltersAll.stream().filter(t -> t.htmltag == 'content').toList()}"
			var="modulox">
			<f:subview id="thing_#{loop.index}">
				<ui:include src="#{modulox.complete}">
					<ui:param name="id"
						value="#{modulox.components.at('/id').asText()}" />
						<ui:param name="uuid" value="#{abstractIdentityBean.uuid}" />
					<ui:param name="type" value="#{modulox.type}" />
					<ui:param name="viewid" value="thing_#{loop.index}" />
					<ui:param name="cgmid" value="#{abstractIdentityBean.gcmid}" />
					<ui:param name="compjson" value="#{modulox.compJson}" />
					<ui:param name="fields" value="#{modulox.fields}" />
					<ui:param name="block" value="#{modulox.block}" />
				</ui:include>
			</f:subview>
		</c:forEach>
	</ui:define>
    
</ui:composition>
