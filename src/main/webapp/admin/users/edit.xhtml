<ui:composition template="/WEB-INF/templates/layout.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="jakarta.faces.core"
	xmlns:h="jakarta.faces.html"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:a="jakarta.faces.passthrough"
	xmlns:c="jakarta.tags.core"
	xmlns:o="http://omnifaces.org/ui"
	xmlns:of="http://omnifaces.org/functions"
	xmlns:p="http://primefaces.org/ui"
	xmlns:k="http://kickoff.example.org/ui">
	

	
	<ui:define name="content">
	
	<p:growl skipDetailIfEqualsSummary="true" id="messages2" showSummary="true"  
		showDetail="true" >  <p:autoUpdate/>
		</p:growl>	
	
		<o:importConstants type="org.example.kickoff.model.Group" />




		<h:form  id="editUserForm">
		
		
		<p:inputText id="a" label="a"
										value="#{editUserBacking.person.firstName}" />
										
										
										<p:inputText id="b" label="b"
										value="#{editUserBacking.person.lastName}" />
										
										
										
										<p:inputText id="c" label="c"
										value="#{editUserBacking.person.email}" />	
										
										<k:input id="groups" type="checkboxes" value="#{editUserBacking.person.groups}" required="true">
				<f:selectItems value="#{Group}" />
				<f:converter converterId="omnifaces.GenericEnumConverter" />
				<f:attribute name="collectionType" value="java.util.HashSet" />
			</k:input>
										
										<p:commandButton  value="Salvar44" title="Salvar" action='#{editUserBacking.save}' update="messages2"
					styleClass="btn btn-primary" icon="fa fa-save"/>
					
										<h:commandButton value="Salvar"
									action='#{editUserBacking.save}' update="messages2"
									styleClass="btn btn-primary" />
		</h:form>

		
	</ui:define>
</ui:composition>
