<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:s="http://jboss.org/schema/seam/taglib"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:f="jakarta.faces.core"
	xmlns:h="jakarta.faces.html"
	xmlns:c="jakarta.tags.core"
	xmlns:p="http://primefaces.org/ui">
	<link href="#{request.contextPath}/themes/theme/css/geoazul.css"
		rel="stylesheet" />
		
		
<style>
    .modal-content iframe{
        margin: 0 auto;
        display: block;
    }
    
    .bd-placeholder-img {
        font-size: 1.125rem;
        text-anchor: middle;
        -webkit-user-select: none;
        -moz-user-select: none;
        user-select: none;
      }

      @media (min-width: 768px) {
        .bd-placeholder-img-lg {
          font-size: 3.5rem;
        }
      }

      .b-example-divider {
        width: 100%;
        height: 3rem;
        background-color: rgba(0, 0, 0, .1);
        border: solid rgba(0, 0, 0, .15);
        border-width: 1px 0;
        box-shadow: inset 0 .5em 1.5em rgba(0, 0, 0, .1), inset 0 .125em .5em rgba(0, 0, 0, .15);
      }

      .b-example-vr {
        flex-shrink: 0;
        width: 1.5rem;
        height: 100vh;
      }

      .bi {
        vertical-align: -.125em;
        fill: currentColor;
      }

      .nav-scroller {
        position: relative;
        z-index: 2;
        height: 2.75rem;
        overflow-y: hidden;
      }

      .nav-scroller .nav {
        display: flex;
        flex-wrap: nowrap;
        padding-bottom: 1rem;
        margin-top: -1px;
        overflow-x: auto;
        text-align: center;
        white-space: nowrap;
        -webkit-overflow-scrolling: touch;
      }

      .btn-bd-primary {
        --bd-violet-bg: #712cf9;
        --bd-violet-rgb: 112.520718, 44.062154, 249.437846;

        --bs-btn-font-weight: 600;
        --bs-btn-color: var(--bs-white);
        --bs-btn-bg: var(--bd-violet-bg);
        --bs-btn-border-color: var(--bd-violet-bg);
        --bs-btn-hover-color: var(--bs-white);
        --bs-btn-hover-bg: #6528e0;
        --bs-btn-hover-border-color: #6528e0;
        --bs-btn-focus-shadow-rgb: var(--bd-violet-rgb);
        --bs-btn-active-color: var(--bs-btn-hover-color);
        --bs-btn-active-bg: #5a23c8;
        --bs-btn-active-border-color: #5a23c8;
      }
      .bd-mode-toggle {
        z-index: 1500;
      }
      
      
      .container {
  max-width: 960px;
}

/*
 * Custom translucent site header
 */

.site-header {
  background-color: rgba(0, 0, 0, .85);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  backdrop-filter: saturate(180%) blur(20px);
}
.site-header a {
  color: #8e8e8e;
  transition: color .15s ease-in-out;
}
.site-header a:hover {
  color: #fff;
  text-decoration: none;
}

/*
 * Dummy devices (replace them with your own or something else entirely!)
 */

.product-device {
  position: absolute;
  right: 10%;
  bottom: -30%;
  width: 300px;
  height: 540px;
  background-color: #333;
  border-radius: 21px;
  transform: rotate(30deg);
}

.product-device::before {
  position: absolute;
  top: 10%;
  right: 10px;
  bottom: 10%;
  left: 10px;
  content: "";
  background-color: rgba(255, 255, 255, .1);
  border-radius: 5px;
}

.product-device-2 {
  top: -25%;
  right: auto;
  bottom: 0;
  left: 5%;
  background-color: #e5e5e5;
}


/*
 * Extra utilities
 */

.flex-equal > * {
  flex: 1;
}
@media (min-width: 768px) {
  .flex-md-equal > * {
    flex: 1;
  }
}
</style>


	<section class="slice py-5 py-lg-7">
		<div class="container">
		
		
		
		
			<div class="row align-items-center">
				<div class="col-12 col-md-6 col-lg-6 order-md-2 mb-5 mb-md-0">
					<div class="card border-0 shadow-lg zindex-100 mb-0">
						<figure>
							<img alt="Image placeholder"
								src="resources/images/new/index4.png"
								class="card-img"/>
						</figure>
						<div class="card-img-overlay d-flex justify-content-end">
							<div class="text-center">
								<ui:fragment rendered="true"> 
							<a
							href="#myModal"   data-toggle="modal"
							class="btn btn-white btn-icon-only rounded-circle shadow-sm hover-scale-110"
									data-fancybox=""><span class="btn-inner--icon text-sm"><i
										data-feather="play" class="text-primary"></i></span>
										</a>
								</ui:fragment> 
							
							</div>
						</div>
					</div>
					
				</div>
				<div class="col-12 col-md-6 col-lg-6 order-md-1 pr-md-5">
					
					<h3 class="h3 mb-4">
							#{compjson.title}
					</h3>
					<p class="lead text-muted">#{compjson.description}</p>
					<div class="mt-5">
			
						 
						<c:forEach
								items="#{compjson.strings.stream().filter(t->t.at('/position').asText() == 'cards').toArray()}"
								var="_socialpos">
								
								
								<a
							href="/post/00e9eeda-cb4a-4aef-a1f9-50cc17bb01d5"     
							class="btn btn-lg btn-primary btn-icon d-lg-inline-block"
							><span class="btn-inner--text"><i data-feather="link"></i> Conhecer</span> <span
							class="btn-inner--icon"></span></a>
								</c:forEach>
						
						<ui:fragment rendered="true"> 
						<a
							href="#myModal"     data-toggle="modal"
							class="btn btn-lg btn-secondary btn-icon d-lg-inline-block"
							><span class="btn-inner--text"> Vídeo</span> <span
							class="btn-inner--icon"><i data-feather="play"></i></span></a>
							</ui:fragment>
					</div>
				</div>
			</div>
		</div>
	
	
        
       


        
        </section>
        

	



	




</ui:composition>
