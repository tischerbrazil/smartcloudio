<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:s="http://jboss.org/schema/seam/taglib"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:f="jakarta.faces.core"
	xmlns:c="jakarta.tags.core"
	xmlns:h="jakarta.faces.html"
	xmlns:p="http://primefaces.org/ui">




	<style>
.chat-btn {
	width: 50px; height : 50px; display : flex; justify-content : center;
	align-items : center; border-radius : 50px;
	background-color: blue;
	color: #fff; font-size : 22px; border : none opacity : 0.8;
	position: fixed;
	bottom: 23px;
	right: 28px;
	font-size: 22px;
	border: none opacity: 0.8;
	height: 50px;
	display: flex;
	justify-content: center;
	align-items: center;
	border-radius: 50px;
}


.field{
margin-bottom:1rem
}

</style>


	<button id="menu-sound" class="btn btn-primary chat-btn">
		<i id='icon-menu-sound' class="fa fa-commenting-o"></i>
	</button>


	
	




	<p:dialog onHide="changeButtonIcon()" position="right" header="Envie sua Mensagem"
		widgetVar="dlg1" minHeight="40" width="350" showEffect="fade">
		
		<h:form id="form555">
		

		
			<div class="field">
				<p:inputText  id="name" value="#{messageBean.message.name}"
				 placeholder="Nome"
				class="form-control" />
			</div>
			
			<div class="field">
				<p:inputText required="true" id="ident" 
				value="#{messageBean.message.email}"
				requiredMessage="Email ou Fone Requerido!" placeholder="Email ou Telefone"
				class="form-control" />
			</div>
			
			<div class="field"> 
			
				<p:inputTextarea rows="3" value="#{messageBean.message.message}"
				 id="messag" placeholder="Digite sua mensagem (opcional)"
				class="form-control" />
			</div>
			

			<p:commandButton id="button" update="#{viewid}:form555" action="#{messageBean.sendForm()}"
			   oncomplete="handleValidateField(xhr, status, args)" value="Enviar" />
		
</h:form>

	</p:dialog>
	

		 
		

		 <h:outputScript id="validateScript" target="body">
	/* <![CDATA[ */
	
	$(document).ready(function() {
		  $('#menu-sound').click(function() {
		    if ($('#icon-menu-sound').hasClass('fa-commenting-o')) {
			  $('#icon-menu-sound').removeClass('fa-commenting-o');
		      $('#icon-menu-sound').addClass('fa-close');
		      PF('dlg1').show()
		    } else if ($('#icon-menu-sound').hasClass('fa-close')) {
		      $('#icon-menu-sound').removeClass('fa-close');
		      $('#icon-menu-sound').addClass('fa-commenting-o');
		      PF('dlg1').hide()
		    }
		  });
		});
		
	function changeButtonIcon() {
			$('#icon-menu-sound').removeClass('fa-close');
	      $('#icon-menu-sound').addClass('fa-commenting-o');
		}
		
    function handleValidateField(xhr, status, args) {
        if(!args.validationFailed) { 
 		        	  PF('dlg1').hide();
 		        	   changeButtonIcon();
  		        }
    }
	/* ]]> */
</h:outputScript>






</ui:composition>
