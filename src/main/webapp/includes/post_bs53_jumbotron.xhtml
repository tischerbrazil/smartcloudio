<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:s="http://jboss.org/schema/seam/taglib"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:f="jakarta.faces.core"
	xmlns:c="jakarta.tags.core"
	xmlns:o="http://omnifaces.org/ui"
	
	xmlns:h="jakarta.faces.html"
	xmlns:p="http://primefaces.org/ui">
	<style>
	.container {
  max-width: 960px;
}

/*
 * Custom translucent site header
 */

.site-header {
  background-color: rgba(0, 0, 0, .85);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  backdrop-filter: saturate(180%) blur(20px);
}
.site-header a {
  color: #8e8e8e;
  transition: color .15s ease-in-out;
}
.site-header a:hover {
  color: #fff;
  text-decoration: none;
}

/*
 * Dummy devices (replace them with your own or something else entirely!)
 */

.product-device {
  position: absolute;
  right: 10%;
  bottom: -30%;
  width: 300px;
  height: 540px;
  background-color: #333;
  border-radius: 21px;
  transform: rotate(30deg);
}

.product-device::before {
  position: absolute;
  top: 10%;
  right: 10px;
  bottom: 10%;
  left: 10px;
  content: "";
  background-color: rgba(255, 255, 255, .1);
  border-radius: 5px;
}

.product-device-2 {
  top: -25%;
  right: auto;
  bottom: 0;
  left: 5%;
  background-color: #e5e5e5;
}


/*
 * Extra utilities
 */

.flex-equal > * {
  flex: 1;
}
@media (min-width: 768px) {
  .flex-md-equal > * {
    flex: 1;
  }
}




 .bd-placeholder-img {
        font-size: 1.125rem;
        text-anchor: middle;
        -webkit-user-select: none;
        -moz-user-select: none;
        user-select: none;
      }

      @media (min-width: 768px) {
        .bd-placeholder-img-lg {
          font-size: 3.5rem;
        }
      }

      .b-example-divider {
        width: 100%;
        height: 3rem;
        background-color: rgba(0, 0, 0, .1);
        border: solid rgba(0, 0, 0, .15);
        border-width: 1px 0;
        box-shadow: inset 0 .5em 1.5em rgba(0, 0, 0, .1), inset 0 .125em .5em rgba(0, 0, 0, .15);
      }

      .b-example-vr {
        flex-shrink: 0;
        width: 1.5rem;
        height: 100vh;
      }

      .bi {
        vertical-align: -.125em;
        fill: currentColor;
      }

      .nav-scroller {
        position: relative;
        z-index: 2;
        height: 2.75rem;
        overflow-y: hidden;
      }

      .nav-scroller .nav {
        display: flex;
        flex-wrap: nowrap;
        padding-bottom: 1rem;
        margin-top: -1px;
        overflow-x: auto;
        text-align: center;
        white-space: nowrap;
        -webkit-overflow-scrolling: touch;
      }

      .btn-bd-primary {
        --bd-violet-bg: #712cf9;
        --bd-violet-rgb: 112.520718, 44.062154, 249.437846;

        --bs-btn-font-weight: 600;
        --bs-btn-color: var(--bs-white);
        --bs-btn-bg: var(--bd-violet-bg);
        --bs-btn-border-color: var(--bd-violet-bg);
        --bs-btn-hover-color: var(--bs-white);
        --bs-btn-hover-bg: #6528e0;
        --bs-btn-hover-border-color: #6528e0;
        --bs-btn-focus-shadow-rgb: var(--bd-violet-rgb);
        --bs-btn-active-color: var(--bs-btn-hover-color);
        --bs-btn-active-bg: #5a23c8;
        --bs-btn-active-border-color: #5a23c8;
      }
      .bd-mode-toggle {
        z-index: 1500;
      }
	</style>
	<section class="slice py-5 py-lg-7">
		<main>
			<div class="d-md-flex flex-md-equal w-100 my-md-3 ps-md-3">
				<c:forEach
					items="#{abstractGeometryBean.getUrlLayer(id).geometrias}"
					var="_geom">
					<h1>#{_geom.strings.at('/class').asText()}</h1>
					<div
						class="text-bg-dark me-md-3 pt-3 px-3 pt-md-5 px-md-5 text-center overflow-hidden">
						<div class="my-1 py-1">
			
								<h6
									style="border-radius: 21px 21px 0 0;color: ##{_geom.strings.at('/color-title').asText()}"
									class="display-6">#{_geom.nome}
									</h6>
							
							<p
								style="border-radius: 21px 21px 0 0;color: ##{_geom.strings.at('/color-introduction').asText()};"
								class="lead">#{_geom.strings.at('/introduction').asText()}</p>
						</div>
						<div class="bg-body-tertiary shadow-sm mx-auto"
							style="width: 500px; height: 400px; border-radius: 21px 21px 0 0;">
							<h:link outcome="/index">
								<f:param name="uuid" value="#{_geom.uuid}" />
								<f:param name="gcmid"
									value="#{compjson.field.get('gcmid').asText()}" />
								<p:graphicImage id="prodimgcart"
									style="width: 500px; height: 400px; border-radius: 21px 21px 0 0;"
									rendered="#{_geom.getMedias().stream().findFirst().isPresent()}"
									value="#{request.scheme}://#{request.serverName}#{request.contextPath}#{_geom.getMedias().stream().sorted((o1, o2)->o2.id.compareTo(o1.id)).findFirst().get().getFilename()}"
									width="100%" />
							</h:link>
						</div>
					</div>
				</c:forEach>
			</div>
		</main>
	</section>
</ui:composition>
