<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:s="http://jboss.org/schema/seam/taglib"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:f="jakarta.faces.core"
    xmlns:c="jakarta.tags.core"
    xmlns:h="jakarta.faces.html"
    xmlns:p="http://primefaces.org/ui"> 
    <script type="text/javascript" src="https://maps.googleapis.com/maps/api/js?v=3&amp;key=AIzaSyCOBaYOuw-PgbbW2VWST0uL9H01mOOEiaU"></script>
    <h:form prependId="false">
        <p:gmap id="gmap" center="-11.38,-61.81" zoom="6" type="ROADMAP"
                model="#{infoWindowView.advancedModel}" style="width:100%;height:460px">
            <p:ajax event="overlaySelect" listener="#{infoWindowView.onMarkerSelect}"/>
            <p:gmapInfoWindow id="infoWindow"> 
                <p:outputPanel style="text-align: center; display: block; margin: auto">
                     <h:outputText escape="false" value="#{infoWindowView.marker.data}"/>
                     <hr/>
              <p:graphicImage  url="#{infoWindowView.marker.title}" />
                </p:outputPanel>
            </p:gmapInfoWindow>
        </p:gmap>
    </h:form>




     
     
    
</ui:composition>
