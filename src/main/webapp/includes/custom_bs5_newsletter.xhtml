<style>
.newsletter {
    padding: 50px 0;
    background: #090bb7;
}


.newsletter .contentLarge {

max-width: 650px;

position: relative;
z-index: 2;

 }

 .content-tuned{

    color: #fff;
 }


 h2 {
    color: #fff;
    margin-bottom: 6px;
 }

    color: #fff;
 }
 
.form-control {
    height: 50px;
    border-color: #ffffff;
    border-radius: 2px 0px 0px 2px;
}


.form-control:focus {
box-shadow: none !important;
border: 2px solid #243c4f;

}


.btn {
min-height: 50px; 
border-radius:0;
background: #243c4f;

color: #fff

}

.unsubscribe-link{
	text-decoration: none !important;

}

</div>
