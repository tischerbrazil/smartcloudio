<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:s="http://jboss.org/schema/seam/taglib"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:f="jakarta.faces.core"
	xmlns:h="jakarta.faces.html"
	xmlns:p="http://primefaces.org/ui">
	<link href="#{request.contextPath}/themes/theme/css/geoazul.css"
		rel="stylesheet" />
		
		
<style>
    .modal-content iframe{
        margin: 0 auto;
        display: block;
    }
</style>


	<section class="slice py-5 py-lg-7">
		<div class="container">
			<div class="row align-items-center">
				<div class="col-12 col-md-6 col-lg-6 order-md-2 mb-5 mb-md-0">
						<h3 class="h3 mb-4">
						<h:outputText escape="false" value="#{compjson.title}" />
					
					</h3>
					<p class="lead text-muted">
					<h:outputText escape="false" value="#{compjson.description}" />
					</p>
					<div class="mt-5">
			
						 
						<a
							href="/post/00e9eeda-cb4a-4aef-a1f9-50cc17bb01d5"     
							class="btn btn-lg btn-primary btn-icon d-lg-inline-block"
							><span class="btn-inner--text"><i data-feather="link"></i> Conhecer</span> <span
							class="btn-inner--icon"></span></a>
						
						<ui:fragment rendered="false"> 
						<a
							href="#myModal"     data-toggle="modal"
							class="btn btn-lg btn-secondary btn-icon d-lg-inline-block"
							><span class="btn-inner--text"> Vídeo</span> <span
							class="btn-inner--icon"><i data-feather="play"></i></span></a>
							</ui:fragment>
					</div>
						
						
						
					
					
				</div>
				<div class="col-12 col-md-6 col-lg-6 order-md-1 pr-md-5">
					
					<div class="card border-0 shadow-lg zindex-100 mb-0">
					
											<figure>
							<p:graphicImage class="card-img" value="/#{compjson.image}" />
						</figure>
						<div class="card-img-overlay d-flex justify-content-end">
							<div class="text-center">
								<ui:fragment rendered="false"> 
							<a
							href="#myModal"   data-toggle="modal"
							class="btn btn-white btn-icon-only rounded-circle shadow-sm hover-scale-110"
									data-fancybox=""><span class="btn-inner--icon text-sm"><i
										data-feather="play" class="text-primary"></i></span>
										</a>
								</ui:fragment> 
							
							</div>
						</div>
						
					
					
					
					</div>
					
					
					
				</div>
			</div>
		</div>
	</section>
	
	
	
	

	



	




</ui:composition>
