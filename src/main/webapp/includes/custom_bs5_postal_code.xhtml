<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:s="http://jboss.org/schema/seam/taglib"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:f="jakarta.faces.core"
	xmlns:h="jakarta.faces.html"
	xmlns:pe="http://primefaces.org/ui/extensions"
	xmlns:pt="jakarta.faces.passthrough" 
	xmlns:c="jakarta.tags.core"
	xmlns:p="http://primefaces.org/ui">
	
	<ui:fragment rendered="#{shoppingCartBean.shoppingCart != null}">

	
	<h:form id="postalForm">
		<li class="nav-item">
		
		<button type="button" 
			data-bs-dismiss="offcanvas" 
			data-bs-target="#bdNavbar"
			onclick="PF('postalCode').show();"
				
				class="btn btn-link nav-link py-2 px-0 px-lg-2"
				aria-expanded="false" data-bs-display="static">
				<span class="d-lg-none" aria-hidden="true"></span> <span class="visually-hidden"></span>
				
				<span class="visually-hidden"></span>
				<p:outputLabel rendered="#{shoppingCartBean.shoppingCart.getZipcode() eq null}" id="barFTextNull" value="Definir CEP:" />
				
				<p:outputLabel rendered="#{shoppingCartBean.shoppingCart.getZipcode() != null}" id="barFText" 
				value="CEP: #{shoppingCartBean.shoppingCart.zipcode}/#{shoppingCartBean.shoppingCart.city.name}" />
				
				
			</button>
			
			
			
		</li>
	</h:form>
	
	
	<p:dialog id="postalCode" header="Insira o destino do pedido"
		widgetVar="postalCode" modal="true" style="border-radius:10px;"
		position="center center" onShow="PF('postalCode').initPosition()">
		<h:form id="userForm">
			<div class="row clearfix">
				<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
					<div class="body">
						<div class="row clearfix">
							<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
								<div class="form-group">
									<span><i class="fa fa-file-code-o" aria-hidden="true"></i>
										<label for="zipcode" class="control-label">C.E.P.</label> </span>
									<div class="form-line">
										<p:inputText class="form-control" required="true" id="zipcode" maxLength="200"
											value="#{shoppingCartBean.shoppingCart.zipcode}" />
									</div>
								</div>
							</div>
						</div>
						
					</div>
				</div>
			</div>
			<div align="center" class="buttons">
			

			<hr/>
				<p:commandButton ajax="true" value="Definir"
					oncomplete="PF('postalCode').hide();"
					
					action='#{shoppingCartBean.updatePostalCode}' 
					update="messages #{viewid}:postalForm #{viewid}:postalForm:barFText" title="Definir"
					 />
						</div>
		</h:form>
	</p:dialog>
		<style>
.ui-growl-pl {
	z-index: 150000 !important;
}
</style>
	</ui:fragment>

</ui:composition>
