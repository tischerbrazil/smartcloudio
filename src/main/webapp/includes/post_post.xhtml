<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:s="http://jboss.org/schema/seam/taglib"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:f="jakarta.faces.core"
	xmlns:h="jakarta.faces.html"
	xmlns:p="http://primefaces.org/ui">

	<section class="slice py-8">
		<div class="container py-5">
			<div class="row clearfix">
				<!-- With Captions -->
				<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
					<div class="body">
						<h4>#{compjson.title}</h4>
						<hr/>
						<ui:repeat id="postitem"
							value="#{urlPostBean.getUrlPost(id).geometrias.stream().filter(car->car.enabled).sorted((o1, o2)->o1.nome.compareTo(o2.nome)).toList()}"
							var="_postitem">
							<strong><p>
								<h:link value="#{_postitem.nome}" outcome="/index">
									<f:param name="uuid" value="#{_postitem.uuid}" />
								<f:param name="gcmid"
												value="#{compjson.field.get('gcmid_redirect').asText()}" />
								</h:link>
							</p></strong>
							<h:outputText escape="false" value="#{_postitem.strings.findValue('introduction')}" />
						</ui:repeat>
					</div>
				</div>
			</div>
		</div>
	</section>
</ui:composition>
