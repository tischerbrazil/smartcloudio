<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:s="http://jboss.org/schema/seam/taglib"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:f="jakarta.faces.core"
	xmlns:h="jakarta.faces.html"
	xmlns:p="http://primefaces.org/ui">
	
 	<style>
.ha-bg-parallax {
	background: url(/themes/bs53/fundo.png) 50% -0
		no-repeat fixed;
	-moz-background-size: cover;
	-o-background-size: cover;
	-webkit-background-size: cover;
	background-size: cover;
	min-height: 460px;
	margin: 0 auto;
	width: 100%;
	display: table;
	vertical-align: middle;
	position: relative;
	background-color: #cccccc;
}

.ha-parallax-body {
	vertical-align: middle;
	background: rgba(0, 0, 0, 0.45);
	text-align: center;
	color: #FFFFFF;
	min-height: 460px;
}

.vertical .carousel-inner {
	height: 100%;
}

.carousel.vertical .item {
	-webkit-transition: 0.6s ease-in-out top;
	-moz-transition: 0.6s ease-in-out top;
	-ms-transition: 0.6s ease-in-out top;
	-o-transition: 0.6s ease-in-out top;
	transition: 0.6s ease-in-out top;
}

.carousel.vertical .active {
	top: 0;
}

.carousel.vertical .next {
	top: 100%;
}

.carousel.vertical .prev {
	top: -100%;
}

.carousel.vertical .next.left, .carousel.vertical .prev.right {
	top: 0;
}

.carousel.vertical .active.left {
	top: -100%;
}

.carousel.vertical .active.right {
	top: 100%;
}

.carousel.vertical .item {
	left: 0;
}

.carousel-indicators {
	position: absolute;
	bottom: 10px;
	left: unset;
	right: 2%;
	z-index: 15;
	width: 1%;
	padding-left: 0;
	margin-left: -30%;
	text-align: right;
	list-style: none;
	top: 30%;
}

#carousel-example-generic {
	top: 200px;
}

.carousel-indicators li {
	float: none
}

#carousel-example-generic h3 {
	font: normal 50px poppinsregular;
	color: #FFFFFF;
	margin: 0;
	text-shadow: 0 0 10px #666;
}

#carousel-example-generic h1 {
	font: normal 80px/61px poppinssemibold;
	color: #FFFFFF;
	margin: 0;
	text-shadow: 0 0 10px #666;
}
</style>
			<script>
				$(document).ready(
						function() {
							var header = $('.main_banner ');

							var backgrounds = new Array(
									'url(/themes/bs53/fundo.png)'

							);
							var current = 0;
							function nextBackground() {
								current++;
								current = current % backgrounds.length;
								header.css('background-image',
										backgrounds[current]);
							}
							setInterval(nextBackground, 5000);
							header.css('background-image', backgrounds[0]);
						});
			</script>

			<div id="firstPage" class="ha-bg-parallax main_banner "
				data-type="background" data-speed="10">
				<div class="ha-parallax-body">
					
							
				</div>
			</div>

</ui:composition>
