<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:s="http://jboss.org/schema/seam/taglib"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:f="jakarta.faces.core"
	xmlns:c="jakarta.tags.core"
	xmlns:o="http://omnifaces.org/ui"
	
	xmlns:h="jakarta.faces.html"
	xmlns:p="http://primefaces.org/ui">


	<style>
ul.info li.info {
	list-style: none;
	padding: 5px 4px 6px 7px;
	margin-bottom: 7px; /* 3px margin plus 1px for the border */
	position: relative;
}

li.info+li.info:before {
	/* this is a pseudo element to create the border */
	content: '';
	display: block;
	height: 1px;
	background: #eff0f1;
	position: absolute;
	top: -4px;
	left: 0;
	right: 0;
}

li.info:hover {
	background-color: #f7f8f8;
}

.navbar {
	z-index: 100;
}

.ui-fab {
	z-index: 50;
}

.ui-growl {
	z-index: 1000 !important;
}

.ui-sidebar {
	overflow-y: scroll !important;
	margin-top: 56px !important;
	z-index: 40 !important;
}

.product-image {
	width: 100px;
	box-shadow: 0 3px 6px rgba(0, 0, 0, .16), 0 3px 6px rgba(0, 0, 0, .23)
}
</style>


	<section class="slice">
		<div class="container">
			<div class="row clearfix">
				
				<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
					<div class="body">
						


						<p:accordionPanel widgetVar="basic2">
							<c:forEach varStatus="accord"
								items="#{abstractGeometryBean.getUrlLayer(id).layerCategories}"
								var="_categ">
								<p:tab title="#{_categ.categoryname}">
									<ui:repeat id="geometries" value="#{_categ.geometrias}"
										var="_geom">
										<p:commandLink icon="fa fa-sort" value="#{_geom.nome}"
											onclick="PF('changeOrder').show();"
											update="#{viewid}:changeOrderForm"
											action="#{abstractGeometryBean.getAbstractGeometry(_geom.uuid)}" />
									</ui:repeat>
								</p:tab>
							</c:forEach>
						</p:accordionPanel>
					</div>
				</div>
			</div>
		</div>
	</section>

	<p:sidebar position="right" blockScroll="true"
		style="overflow-y: scroll;width:100% !important; height:100% !important;"
		modal="true" responsive="true" fitViewport="true"
		widgetVar="changeOrder" id="changeOrder">
		<h:form id="changeOrderForm">
			<div class="col-md-12 col-lg-12">
				<div class="row">
					<ui:repeat id="contentBeanPageItems" var="_itemData"
						value="#{abstractGeometryBean.tableDataShape}">
						<div>
							<h3>#{_itemData['Nome'].value}</h3>
							<hr />
							<p:graphicImage rendered="#{_itemData['Imagem'].value != null}"
								value="#{_itemData['Imagem'].value}"
								class="img3 content_img js-animating-object img-responsive pull-right" />
							<h:outputText escape="false"
								value="#{_itemData['description'].value}" />
							<h:outputText escape="false"
								value="#{_itemData['Descrição'].value}" />
						</div>
					</ui:repeat>
				</div>
				<div class="col-md-12 col-lg-12">
					<p:commandButton id="closeBtn2" value="Fechar Janela"
						oncomplete="PF('changeOrder').hide()" icon="pi pi-times" />
				</div>
			</div>
			<br />
			<br /> 
			<br />
		</h:form>
	</p:sidebar>


</ui:composition>
