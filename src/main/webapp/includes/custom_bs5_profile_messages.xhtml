<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:s="http://jboss.org/schema/seam/taglib"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:f="jakarta.faces.core"
	xmlns:c="jakarta.tags.core"
	xmlns:o="http://omnifaces.org/ui"
	
	xmlns:h="jakarta.faces.html"
	xmlns:p="http://primefaces.org/ui">

	<section>
		<div class="container py-3">
			<h4>Central de Mensagens</h4>
			<h:form id="userForm" class="py-3" prependId="false">
				<div class="row clearfix">
					<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
						<div class="body">
							<div class="row clearfix">
								<p:dataTable id="clients"
									emptyMessage="Nenhuma mensagem encontrada" var="_message"
									value="#{messageBean.activeUserMessages}"
									rowIndexVar="rowIndex">
									<p:column>
										<f:facet name="header">
											<h:outputText value="Id" />
										</f:facet>
										<h:outputText value="#{_message.id}" />
									</p:column>
									<p:column>
										<f:facet name="header">
											<h:outputText value="Data" />
										</f:facet>
										<h:outputText value="#{_message.datetime}">
											<f:convertDateTime type="localDate"
												pattern="dd/MM/yyyy HH:mm" />
										</h:outputText>
									</p:column>
									<p:column>
										<f:facet name="header">
											<h:outputText value="Mensagem" />
										</f:facet>
										<h:outputText value="#{_message.message}" />
									</p:column>
								</p:dataTable>
							</div>
						</div>
					</div>
				</div>
			</h:form>
		</div>
	</section>
</ui:composition>
