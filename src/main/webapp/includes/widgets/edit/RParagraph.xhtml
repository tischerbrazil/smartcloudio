<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:s="http://jboss.org/schema/seam/taglib"
	xmlns:ui="jakarta.faces.facelets" xmlns:f="jakarta.faces.core"
	xmlns:h="jakarta.faces.html" xmlns:p="http://primefaces.org/ui">

	<div class="row">
		<div class="form-group">
			<span><i class="fa fa-user-o" aria-hidden="true"> </i> <label
				for="value" class="control-label"> Texto do Parágrafo</label> </span>
			<div class="form-line">

				<p:textEditor widgetVar="textp" id="texto" height="500"
					required="true" value="#{productAllBean.selectedRComponent.value}">

					<f:facet name="toolbar">
						<span class="ql-formats">
							<button class="ql-bold" />
							<button class="ql-italic" />
							<button class="ql-underline" />
							<button class="ql-strike" />
						</span>
						<span class="ql-formats"> <select class="ql-color" /> <select
							class="ql-background" />
						</span>
					</f:facet>

				</p:textEditor>


			</div>
		</div>
	</div>

</ui:composition>
