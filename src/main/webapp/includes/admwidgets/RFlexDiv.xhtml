<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:s="http://jboss.org/schema/seam/taglib"
	xmlns:ui="jakarta.faces.facelets" xmlns:f="jakarta.faces.core"
	xmlns:h="jakarta.faces.html"
	xmlns:c="http://java.sun.com/jsp/jstl/core"
	xmlns:p="http://primefaces.org/ui">


	<style>
	.dashBack{
	z-index: 400 !important;
	border-style: dashed;
	border-color: coral;
	border-width: 1px;
	}
	</style>


<div class="justify-content-center dashBack"  >
	<c:forEach varStatus="xx" items="#{city.children}" var="eee">
	
	
		<ui:include src="/includes/widgets/#{eee.type}.xhtml">
			<ui:param name="city" value="#{eee}" />
		</ui:include>
		
		
	</c:forEach>
</div>


</ui:composition>
