<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:f="jakarta.faces.core"
    xmlns:h="jakarta.faces.html"
    xmlns:c="http://java.sun.com/jsp/jstl/core"
    xmlns:o="http://omnifaces.org/ui"
	xmlns:of="http://omnifaces.org/functions"
    xmlns:p="http://primefaces.org/ui"> 
    <f:metadata>
		<f:viewParam name="id" value='#{urlPostItemBean.id}' />
		<f:viewParam name="post_id" value='#{urlPostItemBean.post_id}' />
		<f:event type="preRenderView" listener='#{urlPostItemBean.retrieve}' />
	</f:metadata>
	<div class="row"> 
		<ui:repeat var="media" value="#{urlPostItemBean.allMedias}">
			<h:panelGroup  
			rendered="#{media.mimeType == 'image/png' 
			|| media.mimeType == 'image/gif' 
			|| media.mimeType == 'image/jpg'
			|| media.mimeType == 'image/jpeg'}">
				<div class="col-md-2 img-item">
       				<img class="col-md-12 thumbnail" width="200"
       				src="http://#{request.serverName}#{request.contextPath}#{media.filename}" alt="#{media.title}" />
        			<i class="fa fa-check"></i>	
   				</div>
			</h:panelGroup>
		</ui:repeat>
	</div>
</ui:composition>
