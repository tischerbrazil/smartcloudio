<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:s="http://jboss.org/schema/seam/taglib"
	xmlns:ui="jakarta.faces.facelets" xmlns:f="jakarta.faces.core"
	xmlns:pt="jakarta.faces.passthrough" xmlns:h="jakarta.faces.html"
	xmlns:pe="http://primefaces.org/ui/extensions"
	xmlns:c="jakarta.tags.core" xmlns:o="http://omnifaces.org/ui"
	xmlns:xlink="http://www.w3.org/1999/xlink"
	xmlns:p="http://primefaces.org/ui">
	<style>
.modal-header .btn-close {
	margin-right: 0.8rem;
	border: 1px solid var(- -white);
	border-radius: 50%;
	background-color: var(- -white);
}
.modal-header {
	background-repeat: no-repeat;
	background-size: cover;
}
#modal-newsletter>.modal-header {
	background-color: var(- -white);
	display: flex;
	height: 100%;
}
.modal-header {
	padding: 0;
	background-color: rgb(0, 162, 13) !important;
}
.account-login {
	display: flex;
	font-size: 3rem !important;
	color: var(- -white);
	margin-right: 0.rem;
	margin-left: 1.5rem;
}
</style>
	<div class="modal animated slide-in-right" id="exampleModal"
		tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
		<div class="modal-dialog modal-fullscreen">
			<div class="modal-content">
				<div class="modal-header">
					<div class="account-login">
						<span> <ion-icon name="grid-outline"></ion-icon>
						</span>
					</div>
					<div class="text menu-dropdown">
						<span class="msg"><strong>Menu de Navegção</strong></span> <span
							class="msg"> <strong>Categorias de Produtos</strong>
						</span>
					</div>
					<button type="button" class="btn-close" data-bs-dismiss="modal"
						aria-label="Close">
						<i class="fa-solid fa-xmark"></i>
					</button>
				</div>
				<div class="modal-body">
					<div class="modal-line"></div>
					<div class="modal-line"></div>
					<p:panelMenu style="width:100%" model="#{productBean.modelMenuPrincipal}" />
				</div>
			</div>
		</div>
	</div>
	<section class="navigationmenu">
		<nav class="navbar navbar-expand-lg bg-light" id="navbar2">
			<div
				class="container-fluid align-items-center justify-content-center">
				<div
					class="collapse navbar-collapse align-items-center justify-content-center"
					id="navbarNav">
					<ul class="navbar-nav">
						<li class="nav-item dropdown"><a
							class="nav-link dropdown-toggle" href="#" role="button"
							data-bs-toggle="dropdown" aria-expanded="false"> <i class="fa fa-list"></i><strong>
									Departamentos</strong>
						</a>
							<ul class="dropdown-menu">
								
							</ul></li>
							
							<ui:remove>
							
							
						<c:forEach  varStatus="categs" items="#{urlMenuBean.getMenu(375)}"
							var="ca">
							<li class="nav-item dropdown"><a
								class="nav-link dropdown-toggle" href="#" role="button"
								data-bs-toggle="dropdown" aria-expanded="false"> <i class=""></i><strong>
										#{ca.gru_name}</strong>
							</a>
								<ul class="dropdown-menu">
									<c:forEach varStatus="grops" items="#{ca.gru_subgroups}"
										var="grop">
										<li><h:link class="dropdown-item"
												outcome="/ecommerce/index">
												<i class=""></i> #{''} #{grop.sub_name}
												<f:param name="gcmid"
													value="#{compjson.field.get('gcmid').asText()}" />
												<f:param name="subGroupCategory" value="#{grop.id}" />
											</h:link></li>
									</c:forEach>
								</ul></li>
						</c:forEach>
						</ui:remove>
						
						
						
						
						
						<c:forEach  varStatus="categs" items="#{urlMenuBean.getMenu(375).stream().filter(t -> t.parentId.id == null).toList()}"
							var="ca">
							<li class="nav-item dropdown"><a
								class="nav-link dropdown-toggle" href="#" role="button"
								data-bs-toggle="dropdown" aria-expanded="false"> <i class=""></i><strong>
										#{ca.name}</strong>
							</a>
								<ul class="dropdown-menu">
									<c:forEach varStatus="grops" items="#{ca.childrens}"
										var="grop">
										<li><h:link class="dropdown-item"
												outcome="#{grop.link}">
												<i class=""></i> #{''} #{grop.name}
												<f:param name="gcmid"
													value="#{grop.id}" />
												</h:link></li>
									</c:forEach>
								</ul></li>
						</c:forEach>
						</ul>
				</div>
			</div>
		</nav>
	</section>
</ui:composition>
