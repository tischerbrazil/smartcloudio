	<script>
		function onMessage(index, viewid) {
			var state_e = document.getElementById(viewid + ":form:dataPW:"
					+ index + ":combut").classList.contains("ui-button-flat");

			if (state_e == true) {
				document.getElementById(viewid + ":form:dataPW:" + index
						+ ":combut").classList.remove("ui-button-flat");
			} else {
				document.getElementById(viewid + ":form:dataPW:" + index
						+ ":combut").classList.add("ui-button-flat");
			}
		}
	</script>




	<div class="container-xxl bd-gutter mt-3 my-md-4 bd-layout">
		<aside class="bd-sidebar">
			<div class="offcanvas-lg offcanvas-start" tabindex="-1"
				id="bdSidebar" aria-labelledby="bdSidebarOffcanvasLabel">
				<div class="offcanvas-header border-bottom">
					<h5 class="offcanvas-title" id="bdSidebarOffcanvasLabel">Categorias</h5>
					<button type="button" class="btn-close btn-close-white"
						data-bs-dismiss="offcanvas" aria-label="Close"
						data-bs-target="#bdSidebar"></button>
				</div>
				<div class="offcanvas-body">
					<nav class="bd-links w-100" id="bd-docs-nav"
						aria-label="Docs navigation">

						<p:panelMenu style="width:100%"
							model="#{productBean.modelMenuGroup}" />
						<hr />
						<p:panelMenu rendered="false" style="width:100%"
							model="#{productBean.modelMenu}" />

					</nav>
				</div>
			</div>
		</aside>
		<main class="bd-main">
			<div class="card product">
				<h:form id="form">
					<p:dataView id="dataPW" var="product" value="#{productBean.model}"
						multiViewState="false" rows="12"
						emptyMessage="Nenhum produto encontrado!" rowIndexVar="index"
						paginator="true" touchable="false" widgetVar="vtWidget"
						paginatorPosition="bottom"
						paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
						layout="grid" gridIcon="pi pi-th-large" listIcon="pi pi-bars"
						currentPageReportTemplate="{startRecord} até {endRecord} de {totalRecords} produtos"
						gridRowStyleClass="col-6 col-sm-4 col-md-3 col-lg-3 col-xl-3 col-xl-2"
						flex="false">
						<f:facet name="header">

							<button
								class="ui-button ui-widget ui-state-default ui-corner-all ui-button-icon-only ui-button-raised ui-button-danger d-lg-none"
								type="button" data-bs-toggle="offcanvas"
								data-bs-target="#bdSidebar" aria-controls="bdSidebar"
								style="float: left; margin-right: 20px">
								<span class="ui-button-icon-left ui-icon ui-c fa fa-filter"></span>
								<span class="ui-button-text ui-c">ui-button</span>
							</button>

							<i class="fa fa-sort-amount-desc" aria-hidden="true"></i>
							<p:selectOneMenu id="city" value="#{productBean.typeFilter}">
								<p:ajax event="change" listener="#{productBean.processSearch()}"
									update="#{viewid}:form" />
								<f:selectItems value="#{productBean.typeFilters}" />
							</p:selectOneMenu>
						</f:facet>


						<p:dataViewGridItem>
							<div class="product-card border">
								<div class="card-banner">
									<div class="clearfix mb-1">
										<span class="float-end"> <p:commandButton
												style="height: 25px; width: 25px" id="combut"
												styleClass="ui-button-danger heartcard endheart #{product.wishlist.stream().filter((i)->i.person.id == profileBacking.person.id).findFirst().isPresent() ? '' : 'ui-button-flat'}"
												icon="pi pi-heart" widgetVar="saveButton"
												oncomplete="onMessage('#{index.toString()}', '#{viewid}')"
												action="#{productBean.sendMessage(index.toString().concat(',').concat(product.id.toString()).concat(',').concat(viewid.toString()))}" />
										</span>
									</div>
									<h:link outcome="/ecommerce/index">
										<f:param name="id" value="#{product.id}" />
										<f:param name="gcmid"
											value="#{compjson.field.get('gcmid').asText()}" />
										<p:graphicImage class="img-fluid"
											rendered="#{product.images.stream().filter((i)->i.mimeType ne 'video/youtube').findFirst().isPresent()}"
											value="#{product.images.stream().filter((i)->i.mimeType ne 'video/youtube').findFirst().get().getFilename()}" />
									</h:link>
									<ui:remove>
										<div class="card-badge-red">5% Desconto</div>

										<div class="card-badge-full">
											Oferta
											<ion-icon name="flash"></ion-icon>
										</div>
									</ui:remove>

									<div class="card-badge badge badge-danger">#{i18n['ecommerce.'
										+= product.statusInfo]}</div>
								</div>
								<div class="card-body">
									<div class="mb-3">


										<div>
											<strong>#{product.manufacturer.name}</strong>
										</div>
									
										<div class="star">
											<p:rating id="rating33" readonly="true"
												value="#{product.average_rating}" />
										</div>
										<div class="card-price">
											<data value="">R$ <h:outputLabel
												value="#{product.salePrice}"
												style="font-weight: bold;font-size: extra-large">
												<f:convertNumber currencyCode="BRL" minFractionDigits="2"
													currencySymbol="R$" />
											</h:outputLabel> </data>
										</div>


										<p:button styleClass="ui-button-raised ui-button-danger"
											outcome="index" value="Ver mais detalhes">
											<o:pathParam value="#{compjson.field.get('gcmid').asText()}" />
											<o:pathParam value="#{product.id}" />
										</p:button>


									</div>
								</div>
							</div>
						</p:dataViewGridItem>
						<p:dataViewListItem>
							<div class="product-list-item">
								<p:graphicImage
									rendered="#{product.images.stream().filter((i)->i.mimeType ne 'video/youtube').findFirst().isPresent()}"
									value="#{product.images.stream().filter((i)->i.mimeType ne 'video/youtube').findFirst().get().getFilename()}" />
								<div class="product-list-detail">
									<div class="product-name">#{product.name}</div>
									<div class="product-description">#{product.introduction}</div>
									<div class="product-description">
										<h:outputText id="price2" value="#{product.salePrice}"
											styleClass="product-price">
											<f:convertNumber currencySymbol="R$" type="currency" />
										</h:outputText>
									</div>
									<p:rating readonly="true" value="#{product.average_rating}" />

									<i class="pi pi-tag product-category-icon" /><span
										class="product-category">#{product.pro_productSubgroup.sub_name}</span>
								</div>
								<div class="product-list-action">


									<p:button styleClass="ui-button-raised ui-button-danger"
										outcome="index" value="Ver mais detalhes">


										<o:pathParam value="#{compjson.field.get('gcmid').asText()}" />
										<o:pathParam value="#{product.id}" />

									</p:button>

									<h:commandButton
										rendered="#{catalogBean.item.statusInfo.ordinal() lt 4}"
										value="Adicionar ao carinnho"
										action="#{shoppingCartBean.addItemToCart}"
										styleClass="btn btn-danger">
										<f:param name="id" value="#{catalogBean.itemid}" />
										<f:param name="gcmid_redirect"
											value="#{compjson.field.get('gcmid_redirect').asText()}" />
									</h:commandButton>



								</div>
							</div>
						</p:dataViewListItem>
					</p:dataView>
				</h:form>
			</div>


















		</main>



	</div>





















</ui:composition>
