<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="jakarta.faces.html"
	xmlns:f="jakarta.faces.core"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:c="jakarta.tags.core"
	xmlns:pt="jakarta.faces.passthrough"
	xmlns:p="http://primefaces.org/ui"
	template="#{abstractIdentityBean.abstractIdentityEntity.template}/pageTemplate.xhtml">

	<f:metadata>
		<f:event type="preRenderView" listener='#{abstractGeometryBean.retrieve}' />
		<f:viewParam name="id" value='#{abstractGeometryBean.id}' />
		<f:viewParam name="layer_id" value='#{abstractGeometryBean.layer_id}' />
	</f:metadata>

	<ui:define name="content">

		<style>
@media ( min-width : 768px) {
	blockquote {
		margin: 40px 60px;
	}
}

blockquote::before {
	content: "";
	pointer-events: none;
	position: absolute;
	z-index: 1;
	left: 0;
	top: 0;
	right: 0;
	bottom: 0;
	border-radius: var(- -border-rad);
	box-shadow: inset -2px -2px 1px hsl(0 0% 100%), inset 2px 2px 4px
		hsl(0 0% 0%/ 20%);
}

blockquote::after {
	content: "❝";
	position: absolute;
	z-index: 1;
	left: 50%;
	top: -2px;
	transform: translate(-50%, -50%);
	width: 1.3em;
	height: 1.3em;
	background: white;
	box-shadow: 0 4px 5px -1px hsla(0 0% 0%/ 20%);
	border-radius: 999px;
	display: grid;
	place-content: center;
	padding-top: .5em;
	color: var(- -accent-color);
	font-size: 36px;
	font-style: normal;
	text-indent: 0;
}

.blockquote-author-image {
	position: absolute;
	left: 0;
	top: 0;
	width: var(- -quote-image-width);
	height: 100%;
	opacity: 0.75;
	background: var(- -accent-color) var(- -image) no-repeat center/cover;
	background-blend-mode: hard-light;
	border-top-left-radius: var(- -border-rad);
	border-bottom-left-radius: var(- -border-rad);
}

cite {
	display: block;
	margin-top: 30px;
	text-indent: 0;
	text-align: center;
	font: bold .9rem var(- -type-body);
	text-transform: uppercase;
	color: hsl(0 0% 20%);
}

@media ( min-width : 768px) {
	cite {
		margin-left: calc(1rem - var(- -quote-image-width));
	}
}

.cite-last-name {
	background: var(- -accent-color);
	color: var(- -quote-bg);
}

.img3 {
	border: 1px solid #ddd;
	border-radius: 4px;
	padding: 5px;
}
</style>
		<section>
		<div class="container">
			<div class="row">
	
				<div class="col-md-12 order-md-1">
					<ui:repeat id="contentBeanPageItems" var="_itemData"
						value="#{abstractGeometryBean.tableDataShape}">



					<p:graphicImage	rendered="#{abstractGeometryBean.abstractGeometry.medias.size() eq 1 }" 
					url="#{abstractGeometryBean.abstractGeometry.medias.stream().findFirst().get().filename}" style="width: 100%; display: block;" />
					
					
	
						
					<p:galleria rendered="#{abstractGeometryBean.abstractGeometry.medias.size() gt 1 }" value="#{abstractGeometryBean.abstractGeometry.medias}" var="photo"  autoplayInterval="4000" autoPlay="true"
												circular="true" varStatus="status" numVisible="2"
												responsiveOptions="#{catalogBean.responsiveOptions1}"
												showThumbnails="false" showIndicators="false"
												changeItemOnIndicatorHover="false" showItemNavigators="true"
												showItemNavigatorsOnHover="false"
												showIndicatorsOnItem="false" 
												styleClass="custom-indicator-galleria"
												style="max-width: 1640px">
												<p:graphicImage onclick="PF('galleria3').show()"
													url="#{photo.filename}" alt="#{photo.alt}"
													style="width: 100%; display: block;" />
											</p:galleria>


						<div class="padding">
							<div class="detail">
								<div class="time"></div>
								
							</div>
							<h3>#{_itemData['Nome'].value}</h3>
						</div>
						
						
						
						
						
						<hr />
						<h:outputText escape="false"
							value="#{_itemData['description'].value}" />
					</ui:repeat>
					
					
					
					<hr/><br/>
											<div style="text-align: center">
					<h:link style="font-size: 20px" styleClass="btn btn-primary"
													outcome="/index">
													<i class="pi pi-arrow-left"> </i> Voltar 
														</h:link>
					</div>
														<br/><br/>
					
					
				</div>
			</div>
			
			
			
		</div>
		</section>
	
		</ui:include>
	</ui:define>
</ui:composition>
