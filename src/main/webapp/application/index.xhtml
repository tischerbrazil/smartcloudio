<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="jakarta.faces.html"
	xmlns:f="jakarta.faces.core"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:c="jakarta.tags.core"
	xmlns:pt="jakarta.faces.passthrough"
	xmlns:pe="http://primefaces.org/ui/extensions"
	xmlns:p="http://primefaces.org/ui" 
	xmlns:o="http://omnifaces.org/ui"
	template="#{abstractIdentityBean.abstractIdentityEntity.template}/pageTemplate.xhtml">

	<ui:define name="header">
	
	<c:forEach varStatus="loop20" items="#{abstractIdentityBean.moduleFiltersAll.stream().filter(t -> t.htmltag == 'header').toList()}"
			var="modulox20">
			<f:subview id="thing20_#{loop20.index}">
											<c:if test="#{activeUser.can('VIEW_ADMIN_PAGES')}">
									<p:linkButton target="_blank" icon="pi pi-file-edit" 
										outcome="/administrator/module_view" styleClass="rounded-button ui-button-warning" >
							         <o:pathParam value="0" />
    							<o:pathParam value="#{modulox20.moduloId}" />
									</p:linkButton>
								</c:if>
				<ui:include src="#{modulox20.complete}">
					<ui:param name="id"	value="#{modulox20.components.at('/id').asText()}" />
					<ui:param name="uuid" value="#{abstractIdentityBean.id}" />
					<ui:param name="type" value="#{modulox20.type}" />
					<ui:param name="viewid" value="thing20_#{loop20.index}" />
					<ui:param name="cgmid" value="#{abstractIdentityBean.gcmid}" />
					<ui:param name="compjson" value="#{modulox20.compJson}" />
					<ui:param name="fields" value="#{modulox20.compJson.strings}" />
					<ui:param name="rBlock" value="#{modulox20.rBlock}" />
				</ui:include>
			</f:subview>
		</c:forEach>
	</ui:define>
	
	<ui:define name="content">

		<p:growl skipDetailIfEqualsSummary="true" id="messages" showSummary="true"  
		showDetail="true" >  <p:autoUpdate/>
		</p:growl>
						
		<c:forEach varStatus="loop10"
			items="#{abstractIdentityBean.moduleFiltersAll.stream().filter(t -> t.htmltag == 'main').toList()}"
			var="modulox10">
			<f:subview id="thing10_#{loop10.index}">
											<c:if test="#{activeUser.can('VIEW_ADMIN_PAGES')}">
									<p:linkButton target="_blank" icon="pi pi-file-edit" 
										outcome="/administrator/module_view" styleClass="rounded-button ui-button-warning" >
							         <o:pathParam value="0" />
    							<o:pathParam value="#{modulox10.moduloId}" />
									</p:linkButton>
								</c:if>
				<ui:include src="#{modulox10.complete}">
					<ui:param name="id"	value="#{modulox10.components.at('/id').asText()}" />
					<ui:param name="uuid" value="#{abstractIdentityBean.id}" />
					<ui:param name="type" value="#{modulox10.type}" />
					<ui:param name="viewid" value="thing10_#{loop10.index}" />
					<ui:param name="cgmid" value="#{abstractIdentityBean.gcmid}" />
					<ui:param name="compjson" value="#{modulox10.compJson}" />
					<ui:param name="fields" value="#{modulox10.compJson.strings}" />
					<ui:param name="rBlock" value="#{modulox10.rBlock}" />
				</ui:include>
			</f:subview>
		</c:forEach>
		
		<c:forEach varStatus="loop"
			items="#{abstractIdentityBean.moduleFiltersAll.stream().filter(t -> t.htmltag == 'content').toList()}"
			var="modulox">
			<f:subview id="thing_#{loop.index}">
											<c:if test="#{activeUser.can('VIEW_ADMIN_PAGES')}">
					<p:linkButton target="_blank" icon="pi pi-file-edit" 	
							outcome="/administrator/module_view" styleClass="rounded-button ui-button-warning" 
							style="position: absolute;z-index: 1000000">
							<o:pathParam value="0" />
    							<o:pathParam value="#{modulox.moduloId}" />
						</p:linkButton>
				</c:if>
				<ui:include src="#{modulox.complete}">
					<ui:param name="id"
						value="#{modulox.components.at('/id').asText()}" />
						<ui:param name="uuid" value="#{abstractIdentityBean.id}" />
					<ui:param name="type" value="#{modulox.type}" />
					<ui:param name="viewid" value="thing_#{loop.index}" />
					<ui:param name="cgmid" value="#{abstractIdentityBean.gcmid}" />
					<ui:param name="compjson" value="#{modulox.compJson}" />
					<ui:param name="fields" value="#{modulox.compJson.strings}" />
					<ui:param name="rBlock" value="#{modulox.rBlock}" />
				</ui:include>
			</f:subview>
		</c:forEach>
	</ui:define>
	
	
	
	<ui:define name="footer">
	<c:forEach varStatus="loop5"
			items="#{abstractIdentityBean.moduleFiltersAll.stream().filter(t -> t.htmltag == 'footer').toList()}"
			var="modulox1">
			<f:subview id="thing5_#{loop5.index}">
											<c:if test="#{activeUser.can('VIEW_ADMIN_PAGES')}">
									<p:linkButton target="_blank" icon="pi pi-file-edit" 
										outcome="/administrator/module_view" styleClass="rounded-button ui-button-warning" >
							        <o:pathParam value="0" />
    							<o:pathParam value="#{modulox1.moduloId}" />
									</p:linkButton>#{modulox.complete}
								</c:if>
				<ui:include src="#{modulox.complete}">
					<ui:param name="id"
						value="#{modulox.components.at('/id').asText()}" />
					<ui:param name="uuid" value="#{abstractIdentityBean.id}" />
					<ui:param name="viewid" value="thing5_#{loop5.index}" />
					<ui:param name="cgmid" value="#{abstractIdentityBean.gcmid}" />
					<ui:param name="compjson" value="#{modulox1.compJson}" />
					<ui:param name="fields" value="#{modulox1.compJson.strings}" />
					<ui:param name="rBlock" value="#{modulox1.rBlock}" />
				</ui:include>
			</f:subview>
		</c:forEach>
    </ui:define>
</ui:composition>
