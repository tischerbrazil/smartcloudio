<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:f="jakarta.faces.core"
	xmlns:h="jakarta.faces.html"
	xmlns:c="jakarta.tags.core"
	xmlns:p="http://primefaces.org/ui">
	<nav class="#{abstractIdentityBean.abstractIdentityEntity.strings.at('nav_class').asText()}"
		aria-label="Main navigation">
		<div class="container-fluid">
			<a class="navbar-brand" href="#{request.contextPath}/index">
			<p:graphicImage 
				value="/files/#{userData2.realmEntity}/images/logo.png" /></a>
				 <a class="navbar-brand" href="index"> <span>#{abstractIdentityBean.abstractIdentityEntity.title}</span>
			</a>
			<button class="navbar-toggler p-0 border-0" type="button"
				data-toggle="offcanvas" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="navbar-collapse offcanvas-collapse"
				id="navbarsExampleDefault">
				<ul class="navbar-nav mr-auto mb-2 mb-lg-0">
				</ul>
				<ul class="navbar-nav ml-auto">
					<c:forEach
						items="#{abstractIdentityBean.moduleFiltersAll.stream().filter(t -> t.htmltag == 'top_navbar').toList()}"
						var="_module">
						<ui:include
							src="/#{_module.path}#{_module.type}_menu.xhtml">
							<ui:param name="id" value="#{_module.components}" />
						</ui:include>
					</c:forEach>
				</ul>
			</div>
		</div>
	</nav>
</ui:composition>
