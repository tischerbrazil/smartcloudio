<style>
   body {
  padding-bottom: 20px;
}

.navbar {
  margin-bottom: 20px;
}
</style>

		<ui:insert name="head" />
	</h:head>
	<h:body>
		<header class="navbar navbar-expand-lg navbar-dark bd-navbar"
			style="background-image: #{abstractIdentityBean.abstractIdentityEntity.strings.at('/background-image').asText()}">
			<nav class="container-xxl bd-gutter flex-wrap flex-lg-nowrap"
				aria-label="Main navigation">
				<button class="navbar-toggler p-2" type="button"
					data-bs-toggle="offcanvas" data-bs-target="#bdSidebar"
					aria-controls="bdSidebar" aria-label="Toggle docs navigation">
					<p:graphicImage pt:aria-hidden="true" class="bi"
						name="a1/icon_left.svg" />
					<span class="d-none fs-6 pe-1">Categorias</span>
				</button>
				<a class="navbar-brand p-0 me-0 me-lg-2"
					href="#{request.contextPath}/index"
					aria-label="#{abstractIdentityBean.abstractIdentityEntity.title}">
					<img
					width="#{abstractIdentityBean.abstractIdentityEntity.strings.at('/navbar-image-width').asText()}"
					src="#{abstractIdentityBean.abstractIdentityEntity.strings.at('/navbar-image-src').asText()}" />
				</a>
				<button class="navbar-toggler d-flex d-lg-none order-3 p-2"
					type="button" data-bs-toggle="offcanvas" data-bs-target="#bdNavbar"
					aria-controls="bdNavbar" aria-label="Toggle navigation">
					<p:graphicImage pt:aria-hidden="true" class="bi"
						name="a1/icon_right.svg" />
				</button>
				<div class="offcanvas-lg offcanvas-end flex-grow-1" tabindex="-1"
					id="bdNavbar" aria-labelledby="bdNavbarOffcanvasLabel"
					data-bs-scroll="true">
					<div class="offcanvas-header px-4 pb-0">
						<h5 class="offcanvas-title text-white" id="bdNavbarOffcanvasLabel">#{abstractIdentityBean.abstractIdentityEntity.title}</h5>
						<button type="button" class="btn-close btn-close-white"
							data-bs-dismiss="offcanvas" aria-label="Close"
							data-bs-target="#bdNavbar"></button>
					</div>
					<div class="offcanvas-body p-4 pt-0 p-lg-0">
						<hr class="d-lg-none text-white-50" />
						<ul class="navbar-nav flex-row flex-wrap bd-navbar-nav">
							<c:forEach varStatus="loop1"
								items="#{abstractIdentityBean.moduleFiltersAll.stream().filter(t -> t.htmltag == 'top_navbar_left').toList()}"
								var="modulox">
								<f:subview id="thing1_#{loop1.index}">
									<ui:include src="#{modulox.complete}">
										<ui:param name="id"
											value="#{modulox.components.at('/id').asText()}" />
										<ui:param name="uuid" value="#{abstractIdentityBean.uuid}" />
										<ui:param name="viewid" value="thing1_#{loop1.index}" />
										<ui:param name="cgmid" value="#{abstractIdentityBean.gcmid}" />
										<ui:param name="compjson" value="#{modulox.compJson}" />
										<ui:param name="fields" value="#{modulox.fields}" />
									</ui:include>
								</f:subview>
							</c:forEach>
						</ul>
						<hr class="d-lg-none text-white-50" />
						<ul class="navbar-nav flex-row flex-wrap ms-md-auto">
							<li class="nav-item py-1 col-12 col-lg-auto">
								<div class="vr d-none d-lg-flex h-100 mx-lg-2 text-white"></div>
								<hr class="d-lg-none text-white-50" />
							</li>
							<c:forEach varStatus="loop2"
								items="#{abstractIdentityBean.moduleFiltersAll.stream().filter(t -> t.htmltag == 'top_navbar_right').toList()}"
								var="modulox">
								<f:subview id="thing2_#{loop2.index}">
									<ui:include src="#{modulox.complete}">
										<ui:param name="id"
											value="#{modulox.components.at('/id').asText()}" />
										<ui:param name="uuid" value="#{abstractIdentityBean.uuid}" />
										<ui:param name="viewid" value="thing2_#{loop2.index}" />
										<ui:param name="cgmid" value="#{abstractIdentityBean.gcmid}" />
										<ui:param name="compjson" value="#{modulox.compJson}" />
										<ui:param name="fields" value="#{modulox.fields}" />
									</ui:include>
								</f:subview>
							</c:forEach>
						</ul>
					</div>
				</div>
			</nav>
		</header>
		<ui:insert name="content" />
		<c:forEach varStatus="loop5"
			items="#{abstractIdentityBean.moduleFiltersAll.stream().filter(t -> t.htmltag == 'footer').toList()}"
			var="modulox">
			<f:subview id="thing5_#{loop5.index}">
				<ui:include src="#{modulox.complete}">
					<ui:param name="id"
						value="#{modulox.components.at('/id').asText()}" />
					<ui:param name="uuid" value="#{abstractIdentityBean.uuid}" />
					<ui:param name="viewid" value="thing5_#{loop5.index}" />
					<ui:param name="cgmid" value="#{abstractIdentityBean.gcmid}" />
					<ui:param name="compjson" value="#{modulox.compJson}" />
					<ui:param name="fields" value="#{modulox.fields}" />
				</ui:include>
			</f:subview>
		</c:forEach>
		<script
			src="/themes/bs53/docs/5.3/dist/js/bootstrap.bundle.min.js" />
	</h:body>
	<ui:fragment rendered="false">
		<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<div class="card">
				<div class="body">
					<p:dataTable rendered="true" id="modules" styleClass="data-table"
						value="#{abstractIdentityBean.moduleFiltersAll}" var="_item">
						<p:column>
							<f:facet name="header">
								<h:outputText value="TYPE" />
							</f:facet>
							<p:outputLabel value="#{_item.type}" />
						</p:column>
						<p:column>
							<f:facet name="header">
								<h:outputText value="ORDERING" />
							</f:facet>
							<p:outputLabel value="#{_item.ordering}" />
						</p:column>
						<p:column>
							<f:facet name="header">
								<h:outputText value="WIDGET" />
							</f:facet>
							<p:outputLabel value="#{_item.widget_id}" />
						</p:column>

						<p:column>
							<f:facet name="header">
								<h:outputText value="INCLUDE" />
							</f:facet>
							<p:outputLabel value="#{_item.htmltag}" />
						</p:column>
						<p:column>
							<f:facet name="header">
								<h:outputText value="MENU_ITEM" />
							</f:facet>
							<p:outputLabel value="#{_item.urlMenuItem}" />
						</p:column>
						<p:column>
							<f:facet name="header">
								<h:outputText value="COMPONENT" />
							</f:facet>
							<p:outputLabel value="#{_item.components}" />
						</p:column>
					</p:dataTable>
				</div>
			</div>
		</div>
	</ui:fragment>
</f:view>
