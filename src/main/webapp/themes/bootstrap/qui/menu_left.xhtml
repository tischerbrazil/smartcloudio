<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:f="jakarta.faces.core"
    xmlns:h="jakarta.faces.html"
    xmlns:c="jakarta.tags.core"
    xmlns:p="http://primefaces.org/ui"> 
        <aside id="leftsidebar" class="sidebar">
      		<c:forEach items="#{abstractIdentityBean.getModuleFilters('cli_left_sidebar')}" var="_module">
				<ui:include src="#{_module.urlExtension.folder}/#{_module.urlExtension.name}.xhtml">
				 	<ui:param name="id" value="#{_module.fields.id}" />
				</ui:include> 
			</c:forEach>
       	</aside>
</ui:composition>
